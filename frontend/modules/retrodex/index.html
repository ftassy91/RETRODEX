<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RetroDex Module</title>
  <meta http-equiv="refresh" content="0; url=../../index.html">
  <style>
    :root {
      --bg: #0f380f;
      --mid: #306230;
      --light: #8bac0f;
      --bright: #9bbc0f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(139,172,15,0.12), transparent 30%), #020402;
      color: var(--bright);
      font-family: "Courier New", monospace;
    }

    .panel {
      width: min(560px, 100%);
      padding: 24px;
      border: 1px solid rgba(155,188,15,0.2);
      border-radius: 18px;
      background: rgba(15,56,15,0.78);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0.08em;
    }

    p {
      margin: 0 0 16px;
      color: rgba(230,242,216,0.8);
      line-height: 1.45;
    }

    a {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid rgba(155,188,15,0.35);
      border-radius: 999px;
      color: var(--bright);
      text-decoration: none;
      background: rgba(155,188,15,0.1);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>RETRODEX</h1>
    <p>Redirecting to the main RetroDex runtime.</p>
    <a href="../../index.html">Open RetroDex</a>
  </main>
</body>
</html>

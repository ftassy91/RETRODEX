<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#9bbc0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroDex">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>RetroDex — Statistiques</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --panel-bg: rgba(15, 56, 15, 0.2);
        --panel-line: rgba(155, 188, 15, 0.18);
        --panel-line-strong: rgba(155, 188, 15, 0.42);
        --text-strong: #cfe66f;
        --text-soft: rgba(155, 188, 15, 0.62);
        --text-faint: rgba(155, 188, 15, 0.4);
        --legendary: #ddc420;
        --epic: #c48be8;
        --rare: #e88855;
        --uncommon: #44aadd;
        --common: #5a9a3a;
      }

      .stats-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .page-header {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        align-self: stretch;
        padding-bottom: 14px;
      }

      .page-header h1 {
        font-size: 26px;
        color: var(--text-strong);
        letter-spacing: 0.12em;
        margin: 10px 0 6px;
        text-align: left;
      }

      .page-header p {
        font-size: 12px;
        color: var(--text-faint);
        text-align: left;
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-card,
      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 16px;
      }

      .hero-card .label {
        display: block;
        font-size: 0.7rem;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }

      .hero-card .value {
        font-size: 24px;
        color: var(--text-strong);
      }

      .panel h2 {
        font-size: 12px;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
      }

      .rarity-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .rarity-stat {
        padding: 12px;
        border-radius: 6px;
        background: rgba(10, 10, 10, 0.36);
        border: 1px solid currentColor;
      }

      .rarity-stat .name {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .rarity-stat .count {
        display: block;
        font-size: 20px;
      }

      .rarity-stat .pct {
        display: block;
        font-size: 0.7rem;
        color: var(--text-soft);
        margin-top: 4px;
      }

      .bars {
        display: grid;
        gap: 10px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 180px 60px 1fr;
        gap: 12px;
        align-items: center;
      }

      .bar-label,
      .bar-count {
        font-size: 0.7rem;
        color: var(--text-soft);
      }

      .bar-track {
        height: 14px;
        border-radius: 999px;
        background: rgba(155, 188, 15, 0.08);
        overflow: hidden;
        border: 1px solid rgba(155, 188, 15, 0.12);
      }

      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, rgba(155, 188, 15, 0.45), rgba(207, 230, 111, 0.95));
      }

      .price-list {
        display: grid;
        gap: 10px;
      }

      .price-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 6px;
        padding: 12px;
        background: rgba(15, 56, 15, 0.12);
        text-decoration: none;
        color: inherit;
      }

      .price-item:hover {
        border-color: var(--panel-line-strong);
      }

      .price-item .title {
        font-size: 13px;
        color: var(--text-strong);
      }

      .price-item .meta {
        font-size: 0.7rem;
        color: var(--text-soft);
      }

      .price-item .value {
        font-size: 14px;
        color: var(--text-strong);
      }

      .status-text {
        font-size: 0.7rem;
        color: var(--text-faint);
        min-height: 16px;
      }

      @media (max-width: 900px) {
        .hero-stats,
        .rarity-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .bar-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .hero-stats,
        .rarity-grid {
          grid-template-columns: 1fr;
        }

        .price-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="stats-shell">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <span class="current">STATISTIQUES</span>
      </nav>

      <header class="page-header">
        <h1 class="page-title">STATISTIQUES</h1>
        <p class="page-subtitle">Vue globale du catalogue</p>
      </header>

      <section class="hero-stats">
        <article class="hero-card"><span class="label">Total jeux</span><span class="value" id="games-total">—</span></article>
        <article class="hero-card"><span class="label">Consoles</span><span class="value" id="consoles-total">—</span></article>
        <article class="hero-card"><span class="label">Metascore moyen</span><span class="value" id="metascore-average">—</span></article>
        <article class="hero-card"><span class="label">Prix Mint moyen</span><span class="value" id="mint-average">—</span></article>
      </section>

      <section class="panel">
        <h2>Répartition par rareté</h2>
        <div id="rarity-grid" class="rarity-grid"></div>
      </section>

      <section class="panel">
        <h2>Top consoles</h2>
        <div id="top-consoles" class="bars"></div>
      </section>

      <section class="panel">
        <h2>Jeux les plus chers</h2>
        <div id="price-list" class="price-list"></div>
      </section>
    </main>

    <script>
      const gamesTotalEl = document.getElementById("games-total");
      const consolesTotalEl = document.getElementById("consoles-total");
      const metascoreAverageEl = document.getElementById("metascore-average");
      const mintAverageEl = document.getElementById("mint-average");
      const rarityGridEl = document.getElementById("rarity-grid");
      const topConsolesEl = document.getElementById("top-consoles");
      const priceListEl = document.getElementById("price-list");

      const rarityOrder = ["LEGENDARY", "EPIC", "RARE", "UNCOMMON", "COMMON"];

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function rarityClass(value) {
        return String(value || "COMMON").toLowerCase();
      }

      function formatCurrency(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `$${number.toFixed(1)}`.replace(".0", "") : "$0";
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      async function fetchAllGames() {
        const payload = await fetchJson("/api/games?limit=507");
        if (Array.isArray(payload.items) && payload.items.length === payload.total) {
          return payload.items;
        }
        const fallback = await fetchJson("/games");
        return Array.isArray(fallback) ? fallback : payload.items || [];
      }

      function renderRarityBreakdown(games, totalGames) {
        const counts = new Map(rarityOrder.map((rarity) => [rarity, 0]));
        for (const game of games) {
          const rarity = counts.has(game.rarity) ? game.rarity : "COMMON";
          counts.set(rarity, counts.get(rarity) + 1);
        }

        rarityGridEl.innerHTML = rarityOrder.map((rarity) => {
          const count = counts.get(rarity) || 0;
          const pct = totalGames ? ((count / totalGames) * 100).toFixed(1) : "0.0";
          return `
            <div class="rarity-stat rarity-${escapeHtml(rarityClass(rarity))}">
              <span class="name">${escapeHtml(rarity)}</span>
              <span class="count">${escapeHtml(count)}</span>
              <span class="pct">${escapeHtml(pct)}%</span>
            </div>
          `;
        }).join("");
      }

      function renderTopConsoles(topConsoles) {
        const max = Math.max(...topConsoles.map((item) => item.gamesCount), 1);
        topConsolesEl.innerHTML = topConsoles.map((item) => `
          <div class="bar-row">
            <div class="bar-label">${escapeHtml(item.name)}</div>
            <div class="bar-count">${escapeHtml(item.gamesCount)}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${((item.gamesCount / max) * 100).toFixed(2)}%"></div>
            </div>
          </div>
        `).join("");
      }

      function renderMostExpensive(games) {
        const topFive = [...games]
          .filter((game) => Number.isFinite(Number(game.mintPrice)))
          .sort((left, right) => Number(right.mintPrice) - Number(left.mintPrice))
          .slice(0, 5);

        priceListEl.innerHTML = topFive.map((game, index) => `
          <a class="price-item" href="/game-detail.html?id=${encodeURIComponent(game.id)}">
            <div>
              <div class="title">#${index + 1} ${escapeHtml(game.title)}</div>
              <div class="meta">${escapeHtml(game.console || "Console inconnue")} · Mint ${escapeHtml(formatCurrency(game.mintPrice))}</div>
            </div>
            <div class="value">${escapeHtml(formatCurrency(game.mintPrice))}</div>
          </a>
        `).join("");
      }

      function renderHero(stats, games) {
        const mintValues = games
          .map((game) => Number(game.mintPrice))
          .filter((value) => Number.isFinite(value) && value > 0);
        const mintAverage = mintValues.length
          ? mintValues.reduce((sum, value) => sum + value, 0) / mintValues.length
          : 0;

        gamesTotalEl.textContent = String(stats.totals.games);
        consolesTotalEl.textContent = String(stats.totals.consoles);
        metascoreAverageEl.textContent = String(stats.totals.averageMetascore);
        mintAverageEl.textContent = formatCurrency(mintAverage);
      }

      async function loadStats() {
        try {
          const [stats, games] = await Promise.all([
            fetchJson("/api/stats"),
            fetchAllGames(),
          ]);

          renderHero(stats, games);
          renderRarityBreakdown(games, stats.totals.games);
          renderTopConsoles(stats.topConsoles || []);
          renderMostExpensive(games);
        } catch (error) {
          console.error("Erreur stats :", error);
        }
      }

      loadStats();
    </script>
  </body>
</html>

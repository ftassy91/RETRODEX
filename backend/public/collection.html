<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#9bbc0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroDex">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>RetroDex - Ma collection</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --panel-bg: rgba(15, 56, 15, 0.2);
        --panel-line: rgba(155, 188, 15, 0.18);
        --panel-line-strong: rgba(155, 188, 15, 0.42);
        --text-strong: #cfe66f;
        --text-soft: rgba(155, 188, 15, 0.62);
        --text-faint: rgba(155, 188, 15, 0.4);
      }

      .collection-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .page-header {
        max-width: 1100px;
        margin: 0 auto;
        padding-bottom: 14px;
      }

      .summary-bar {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .summary-card,
      .collection-card {
        background: var(--panel-bg);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 16px;
      }

      .summary-card .label {
        display: block;
        font-size: 10px;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }

      .summary-card .value {
        font-size: 24px;
        color: var(--text-strong);
      }

      .collection-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .collection-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-title {
        font-size: 15px;
        color: var(--text-strong);
        text-decoration: none;
        font-weight: bold;
      }

      .card-title:hover {
        text-decoration: underline;
      }

      .card-subtitle {
        font-size: 11px;
        color: var(--text-soft);
      }

      .note-row {
        font-size: 12px;
        color: var(--text-soft);
        line-height: 1.5;
      }

      .price-row {
        font-size: 11px;
        color: var(--text-soft);
        line-height: 1.6;
      }

      .danger-btn {
        border-color: rgba(155, 188, 15, 0.25);
      }

      .danger-btn:hover {
        border-color: #e74c3c;
        background: rgba(231, 76, 60, 0.08);
      }

      .empty-state {
        background: rgba(15, 56, 15, 0.12);
        border: 1px dashed rgba(155, 188, 15, 0.18);
        border-radius: 6px;
        padding: 40px 20px;
        text-align: center;
        color: var(--text-faint);
      }

      .empty-state p {
        font-size: 13px;
        margin-bottom: 16px;
      }

      .status-text {
        font-size: 11px;
        color: var(--text-faint);
        min-height: 16px;
      }

      @media (max-width: 800px) {
        .summary-bar,
        .collection-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="collection-shell">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <span class="current">MA COLLECTION</span>
      </nav>

      <header class="page-header">
        <h1 class="page-title">MA COLLECTION</h1>
      </header>

      <nav class="tabs" aria-label="Vues de collection">
        <button type="button" class="tab-btn active" data-tab="owned">MA COLLECTION</button>
        <button type="button" class="tab-btn" data-tab="wanted">WISHLIST</button>
        <button type="button" class="tab-btn" data-tab="for_sale">À VENDRE</button>
      </nav>

      <section class="summary-bar">
        <article class="summary-card">
          <span class="label">Total items</span>
          <span class="value" id="total-items">&mdash;</span>
        </article>
        <article class="summary-card">
          <span class="label">Valeur Loose</span>
          <span class="value" id="total-loose">&mdash;</span>
        </article>
        <article class="summary-card">
          <span class="label">Valeur Mint</span>
          <span class="value" id="total-mint">&mdash;</span>
        </article>
      </section>

      <div id="status-text" class="status-text">Chargement...</div>

      <section id="collection-content"></section>
    </main>

    <script>
      const totalItemsEl = document.getElementById("total-items");
      const totalLooseEl = document.getElementById("total-loose");
      const totalMintEl = document.getElementById("total-mint");
      const statusTextEl = document.getElementById("status-text");
      const collectionContentEl = document.getElementById("collection-content");
      const tabButtons = Array.from(document.querySelectorAll("[data-tab]"));

      let enrichedItems = [];
      let activeTab = "owned";

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatCurrency(value) {
        const number = Number(value);
        return Number.isFinite(number) && number > 0 ? `$${number}` : "$—";
      }

      function rarityClass(value) {
        return String(value || "COMMON").toLowerCase();
      }

      function conditionClass(value) {
        const normalized = String(value || "Loose").toLowerCase();
        return normalized === "mint" ? "mint" : normalized === "cib" ? "cib" : "loose";
      }

      function getTabLabel(tab) {
        if (tab === "wanted") return "la wishlist";
        if (tab === "for_sale") return "la liste à vendre";
        return "votre collection";
      }

      function getCollectionApiUrl(tab) {
        const params = new URLSearchParams();
        params.set("list_type", tab);
        return `/api/collection?${params.toString()}`;
      }

      function getCurrentConditionPrice(item) {
        if (!item?.game) {
          return null;
        }

        const condition = String(item.condition || "Loose").toLowerCase();
        if (condition === "mint") return item.game.mintPrice;
        if (condition === "cib") return item.game.cibPrice;
        return item.game.loosePrice;
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.error || `${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      function computeTotals(items) {
        return items.reduce((acc, item) => {
          acc.count += 1;
          acc.loose += Number(item.game?.loosePrice || 0);
          acc.mint += Number(item.game?.mintPrice || 0);
          return acc;
        }, { count: 0, loose: 0, mint: 0 });
      }

      function updateSummary(items) {
        const totals = computeTotals(items);
        totalItemsEl.textContent = String(totals.count);
        totalLooseEl.textContent = formatCurrency(totals.loose);
        totalMintEl.textContent = formatCurrency(totals.mint);
      }

      function renderEmptyState(tab) {
        if (tab === "wanted") {
          collectionContentEl.innerHTML = `
            <div class="empty-state">
              <p>Aucun jeu dans la wishlist</p>
            </div>
          `;
          return;
        }

        if (tab === "for_sale") {
          collectionContentEl.innerHTML = `
            <div class="empty-state">
              <p>Aucun jeu à vendre</p>
            </div>
          `;
          return;
        }

        collectionContentEl.innerHTML = `
          <div class="empty-state">
            <p>Aucun jeu &mdash; ajoutez-en depuis une fiche</p>
            <a href="/games-list.html" class="btn">Parcourir le catalogue &rarr;</a>
          </div>
        `;
      }

      function renderOwnedCollection(items) {
        if (!items.length) {
          renderEmptyState("owned");
          return;
        }

        collectionContentEl.innerHTML = `
          <div class="collection-grid">
            ${items.map((item) => `
              <article class="collection-card" data-item-id="${escapeHtml(item.id)}">
                <div class="card-head">
                  <div>
                    <div class="title-row">
                      <a class="card-title" href="/game-detail.html?id=${encodeURIComponent(item.game.id)}">${escapeHtml(item.game.title)}</a>
                      <span class="condition-badge condition-${escapeHtml(conditionClass(item.condition))}">${escapeHtml(item.condition || "Loose")}</span>
                    </div>
                    <div class="card-subtitle">${escapeHtml(item.game.platform || item.game.console || "Console inconnue")} &middot; ${escapeHtml(item.game.year || "n/a")}</div>
                    ${item.notes ? `<div class="note-row">${escapeHtml(item.notes)}</div>` : ""}
                  </div>
                  <span class="rarity-badge rarity-${escapeHtml(rarityClass(item.game.rarity))}">${escapeHtml(item.game.rarity || "COMMON")}</span>
                </div>
                <div class="price-row">
                  Loose ${escapeHtml(formatCurrency(item.game.loosePrice))} &middot; CIB ${escapeHtml(formatCurrency(item.game.cibPrice))} &middot; Mint ${escapeHtml(formatCurrency(item.game.mintPrice))}
                </div>
                <div>
                  <button type="button" class="btn danger-btn" data-delete-id="${escapeHtml(item.id)}">Retirer</button>
                </div>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderWishlist(items) {
        if (!items.length) {
          renderEmptyState("wanted");
          return;
        }

        collectionContentEl.innerHTML = `
          <div class="collection-grid">
            ${items.map((item) => `
              <article class="collection-card" data-item-id="${escapeHtml(item.id)}">
                <div class="card-head">
                  <div>
                    <div class="title-row">
                      <a class="card-title" href="/game-detail.html?id=${encodeURIComponent(item.game.id)}">${escapeHtml(item.game.title)}</a>
                      <span class="condition-badge condition-${escapeHtml(conditionClass(item.condition))}">${escapeHtml(item.condition || "Loose")}</span>
                    </div>
                    <div class="card-subtitle">${escapeHtml(item.game.platform || item.game.console || "Console inconnue")} &middot; ${escapeHtml(item.game.year || "n/a")}</div>
                    <div class="collection-market-line">
                      Prix actuel ${escapeHtml(String(item.condition || "Loose").toUpperCase())} : ${escapeHtml(formatCurrency(getCurrentConditionPrice(item)))}
                    </div>
                    ${item.notes ? `<div class="note-row">${escapeHtml(item.notes)}</div>` : ""}
                  </div>
                  <span class="rarity-badge rarity-${escapeHtml(rarityClass(item.game.rarity))}">${escapeHtml(item.game.rarity || "COMMON")}</span>
                </div>
                <div class="price-row">
                  Loose ${escapeHtml(formatCurrency(item.game.loosePrice))} &middot; CIB ${escapeHtml(formatCurrency(item.game.cibPrice))} &middot; Mint ${escapeHtml(formatCurrency(item.game.mintPrice))}
                </div>
                <div>
                  <button type="button" class="btn danger-btn" data-delete-id="${escapeHtml(item.id)}">Retirer</button>
                </div>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderForSale(items) {
        if (!items.length) {
          renderEmptyState("for_sale");
          return;
        }

        collectionContentEl.innerHTML = `
          <div class="collection-grid">
            ${items.map((item) => `
              <article class="collection-card" data-item-id="${escapeHtml(item.id)}">
                <div class="card-head">
                  <div>
                    <div class="title-row">
                      <a class="card-title" href="/game-detail.html?id=${encodeURIComponent(item.game.id)}">${escapeHtml(item.game.title)}</a>
                      <span class="condition-badge condition-${escapeHtml(conditionClass(item.condition))}">${escapeHtml(item.condition || "Loose")}</span>
                    </div>
                    <div class="collection-paid-line">
                      Prix payé : <strong>${escapeHtml(formatCurrency(item.price_paid))}</strong>
                    </div>
                    ${item.notes ? `<div class="note-row">${escapeHtml(item.notes)}</div>` : ""}
                  </div>
                </div>
                <div>
                  <button type="button" class="btn danger-btn" data-delete-id="${escapeHtml(item.id)}">Retirer</button>
                </div>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderActiveTab(items) {
        if (activeTab === "wanted") {
          renderWishlist(items);
          return;
        }

        if (activeTab === "for_sale") {
          renderForSale(items);
          return;
        }

        renderOwnedCollection(items);
      }

      function syncActiveTabButton() {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.getAttribute("data-tab") === activeTab);
        });
      }

      function setActiveTab(tab) {
        activeTab = tab;
        syncActiveTabButton();
        loadCollection();
      }

      async function loadCollection() {
        statusTextEl.textContent = "Chargement...";
        collectionContentEl.innerHTML = "";

        try {
          const payload = await fetchJson(getCollectionApiUrl(activeTab));
          const items = (payload.items || []).filter((item) => item.game);

          enrichedItems = items;
          updateSummary(enrichedItems);
          renderActiveTab(enrichedItems);
          statusTextEl.textContent = items.length ? `${items.length} jeu(x) dans ${getTabLabel(activeTab)}.` : "";
        } catch (error) {
          statusTextEl.textContent = `Erreur collection : ${error.message}`;
          enrichedItems = [];
          updateSummary(enrichedItems);
          renderEmptyState(activeTab);
        }
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const nextTab = button.getAttribute("data-tab") || "owned";
          if (nextTab === activeTab) {
            return;
          }
          setActiveTab(nextTab);
        });
      });

      collectionContentEl.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-delete-id]");
        if (!button) {
          return;
        }

        const collectionItemId = button.getAttribute("data-delete-id");
        statusTextEl.textContent = "Suppression...";
        button.disabled = true;

        try {
          await fetchJson(`/api/collection/${encodeURIComponent(collectionItemId)}`, {
            method: "DELETE",
          });
          enrichedItems = enrichedItems.filter((item) => String(item.id) !== String(collectionItemId));
          updateSummary(enrichedItems);
          renderActiveTab(enrichedItems);
          statusTextEl.textContent = "Jeu retiré.";
        } catch (error) {
          statusTextEl.textContent = `Erreur suppression : ${error.message}`;
          button.disabled = false;
        }
      });

      syncActiveTabButton();
      loadCollection();
    </script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex Collection</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081008;
        --panel: #102010;
        --line: #294229;
        --text: #d7efd7;
        --muted: #98b898;
        --accent: #8bac0f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Consolas, "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0 0 12px;
      }

      .panel {
        margin-bottom: 16px;
        padding: 16px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .button-link,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: #183018;
        color: var(--text);
        text-decoration: none;
        font: inherit;
        cursor: pointer;
        min-width: 170px;
      }

      .button-link:hover,
      button:hover {
        border-color: var(--accent);
      }

      .status {
        color: var(--accent);
        min-height: 20px;
      }

      .muted {
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .item-card {
        border: 1px solid var(--line);
        background: #0b160b;
        padding: 12px;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>RetroDex Collection</h1>
        <p class="muted">
          Page beginner qui consomme <code>GET /api/collection</code> et
          <code>DELETE /api/collection/:id</code>.
        </p>
        <div class="actions">
          <a class="button-link" href="/home.html">Retour a Home backend</a>
          <a class="button-link" href="/games-list.html">Ouvrir GamesList</a>
          <a class="button-link" href="/game-detail.html?id=tetris-game-boy">Ouvrir GameDetail</a>
          <button id="refreshButton" type="button">Rafraichir</button>
        </div>
      </section>

      <section class="panel">
        <h2>Etat</h2>
        <div id="status" class="status">Chargement de la collection...</div>
      </section>

      <section class="panel">
        <h2>Items</h2>
        <div id="results" class="grid"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");
      const refreshButtonEl = document.getElementById("refreshButton");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function fetchJson(url) {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        return response.json();
      }

      async function deleteJson(url) {
        const response = await fetch(url, { method: "DELETE" });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || `${response.status} ${response.statusText}`);
        }

        return response.json();
      }

      function itemCard(item) {
        return `
          <article class="item-card">
            <h3>${escapeHtml(item.gameId)}</h3>
            <div class="meta">
              <div><span class="muted">Item ID</span><br>${escapeHtml(item.id)}</div>
              <div><span class="muted">Condition</span><br>${escapeHtml(item.condition || "n/a")}</div>
              <div><span class="muted">Notes</span><br>${escapeHtml(item.notes || "n/a")}</div>
            </div>
            <div class="actions">
              <a class="button-link" href="/game-detail.html?id=${encodeURIComponent(item.gameId)}">Voir le jeu</a>
              <button type="button" data-delete-id="${escapeHtml(item.id)}">Supprimer</button>
            </div>
          </article>
        `;
      }

      async function loadCollection() {
        statusEl.textContent = "Chargement...";
        resultsEl.innerHTML = "";

        try {
          const data = await fetchJson("/api/collection");
          statusEl.textContent = `${data.total} item(s) dans la collection.`;

          if (!data.items.length) {
            resultsEl.innerHTML = `<div class="muted">La collection est vide pour l'instant.</div>`;
            return;
          }

          resultsEl.innerHTML = data.items.map(itemCard).join("");
        } catch (error) {
          statusEl.textContent = `Erreur collection - ${error.message}`;
          resultsEl.innerHTML = "";
        }
      }

      resultsEl.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-delete-id]");

        if (!button) {
          return;
        }

        const deleteId = button.getAttribute("data-delete-id");
        statusEl.textContent = `Suppression de l'item #${deleteId}...`;

        try {
          await deleteJson(`/api/collection/${encodeURIComponent(deleteId)}`);
          statusEl.textContent = `Item #${deleteId} supprime.`;
          await loadCollection();
        } catch (error) {
          statusEl.textContent = `Erreur suppression - ${error.message}`;
        }
      });

      refreshButtonEl.addEventListener("click", () => {
        loadCollection();
      });

      loadCollection();
    </script>
  </body>
</html>

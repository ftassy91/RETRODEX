<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#9bbc0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RetroDex" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>RetroDex &mdash; Fiche jeu</title>
    <meta name="description" content="Fiche RetroDex d'un jeu retro : lecture, contexte, valeur et collection." />
    <meta property="og:title" content="Fiche jeu | RetroDex" />
    <meta property="og:description" content="Fiche RetroDex d'un jeu retro : lecture, contexte, valeur et collection." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="/style.css?v=20260408s2" />
  </head>
  <body>
    <nav class="global-product-nav global-product-nav-unified" aria-label="Navigation produit RetroDex">
      <a class="global-product-link" href="/hub.html">
        <span class="nav-label">Hub</span>
        <span class="nav-copy">entrer | ouvrir | reprendre</span>
      </a>
      <a class="global-product-link is-active" href="/games-list.html">
        <span class="nav-label">RetroDex</span>
        <span class="nav-copy">index | recherche | fiches</span>
      </a>
      <a class="global-product-link" href="/collection.html">
        <span class="nav-label">Collection</span>
        <span class="nav-copy">etagere | valeur | priorites</span>
      </a>
    </nav>
    <main class="detail-shell">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <a id="catalog-back-link" href="/games-list.html">RETRODEX</a>
        <span class="sep">&rsaquo;</span>
        <span class="current" id="breadcrumb-title">&mdash;</span>
      </nav>

      <section id="hero" class="hero-card">
        <div class="loading-card">Chargement...</div>
      </section>

      <section id="synopsis-band" class="synopsis-band" hidden></section>

      <div id="provenance-line" class="provenance-line" hidden></div>

      <section id="related-shell" class="related-card detail-accordion" hidden>
        <button type="button" class="detail-accordion-toggle" aria-expanded="false" aria-controls="related-content">
          <span>Connexions</span>
          <span class="detail-accordion-indicator">&#9656;</span>
        </button>
        <div id="related-content" class="detail-accordion-content" hidden></div>
      </section>

      <section id="editorial-shell" class="editorial-card detail-accordion" hidden>
        <button type="button" class="detail-accordion-toggle" aria-expanded="false" aria-controls="editorial-content">
          <span>Lecture</span>
          <span class="detail-accordion-indicator">&#9656;</span>
        </button>
        <div id="editorial-content" class="detail-accordion-content" hidden></div>
      </section>

      <section id="collection-shell" class="collection-card detail-accordion">
        <button type="button" class="detail-accordion-toggle" aria-expanded="false" aria-controls="collection-content">
          <span>Ma collection</span>
          <span class="detail-accordion-indicator">&#9656;</span>
        </button>
        <div id="collection-content" class="detail-accordion-content" hidden>
          <div class="collection-row">
            <div class="collection-state-block">
              <div id="collection-state" class="collection-state"></div>
              <div id="collection-current-meta" class="collection-current-meta"></div>
            </div>
            <div class="collection-action-group">
              <button id="collection-button" type="button" class="btn" disabled>Chargement</button>
              <button id="wishlist-button" type="button" class="btn" disabled>Wishlist</button>
              <button id="collection-remove-button" type="button" class="btn btn-danger" hidden>Retirer</button>
            </div>
          </div>
          <div id="collection-form" class="collection-form">
            <div class="collection-controls">
              <select id="collection-condition" class="collection-condition-select" aria-label="Etat">
                <option value="Loose">Loose</option>
                <option value="CIB">CIB</option>
                <option value="Mint">Mint</option>
              </select>
              <input id="collection-price-paid" class="collection-condition-select" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Prix" aria-label="Prix" />
              <input id="collection-purchase-date" class="collection-condition-select" type="date" aria-label="Date" />
            </div>
            <textarea id="collection-notes" class="collection-note-input" maxlength="320" rows="2" placeholder="Notes"></textarea>
          </div>
          <div id="collection-status" class="status-text"></div>
        </div>
      </section>

      <section id="stats-shell" class="stats-card detail-accordion">
        <button type="button" class="detail-accordion-toggle" aria-expanded="false" aria-controls="stats-content">
          <span>Donnees de reference</span>
          <span class="detail-accordion-indicator">&#9656;</span>
        </button>
        <div id="stats-content" class="detail-accordion-content" hidden>
          <div id="stats-row" class="stats-grid"></div>
          <div id="retrodex-index" class="retrodex-index-shell">
            <div class="index-loading">Chargement des prix...</div>
          </div>
        </div>
      </section>

      <section id="price-history-shell" class="price-history detail-accordion" hidden>
        <button type="button" class="detail-accordion-toggle" aria-expanded="false" aria-controls="price-history-content">
          <span>Historique des prix</span>
          <span class="detail-accordion-indicator">&#9656;</span>
        </button>
        <div id="price-history-content" class="detail-accordion-content" hidden>
          <div class="chart-toggle"></div>
          <div class="period-selector"></div>
          <div class="chart-container">
            <svg id="price-chart" style="width:100%;height:300px"></svg>
          </div>
          <div id="chart-labels" class="chart-labels"></div>
          <div class="price-stats-row"></div>
        </div>
      </section>

    </main>

    <script src="/js/core/config.js"></script>
    <script src="/js/core/dom.js"></script>
    <script src="/js/core/format.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/state.js"></script>
    <script src="/js/core/assets.js"></script>
    <script src="/js/core/metascore.js"></script>
    <script src="/js/core/content-signals.js"></script>
    <script src="/js/pages/game-detail.js?v=20260408s2"></script>
    <script src="/js/features/experience-layer.js"></script>
    <div class="footer-attribution">
      Covers :
      <a href="https://www.igdb.com" target="_blank" rel="noopener noreferrer">IGDB.com</a>
    </div>
  </body>
</html>

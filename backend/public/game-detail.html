<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#9bbc0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroDex">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>RetroDex — Fiche jeu</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --panel-bg: rgba(15, 56, 15, 0.2);
        --panel-line: rgba(155, 188, 15, 0.18);
        --panel-line-strong: rgba(155, 188, 15, 0.4);
        --text-strong: #cfe66f;
        --text-soft: rgba(155, 188, 15, 0.65);
        --text-faint: rgba(155, 188, 15, 0.42);
        --legendary: #ddc420;
        --epic: #c48be8;
        --rare: #e88855;
        --uncommon: #44aadd;
        --common: #5a9a3a;
      }

      .detail-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .top-nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hero-card,
      .summary-card,
      .collection-card,
      .similar-card,
      .stats-card {
        background: var(--panel-bg);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 18px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
        gap: 16px;
        align-items: start;
      }

      .hero-title {
        font-size: 30px;
        color: var(--text-strong);
        margin-bottom: 10px;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .pill {
        border: 1px solid rgba(155, 188, 15, 0.22);
        background: rgba(155, 188, 15, 0.08);
        color: rgba(155, 188, 15, 0.76);
      }

      .developer-line {
        font-size: 12px;
        color: var(--text-soft);
      }

      .price-panel {
        background: rgba(10, 10, 10, 0.38);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 16px;
      }

      .price-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }

      .metascore-circle {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 2px solid rgba(155, 188, 15, 0.4);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--text-strong);
      }

      .metascore-circle strong {
        font-size: 20px;
        line-height: 1;
      }

      .metascore-circle span {
        font-size: 9px;
        color: var(--text-faint);
        letter-spacing: 0.08em;
      }

      .price-table {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .price-cell {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 4px;
        padding: 12px;
        background: rgba(15, 56, 15, 0.18);
      }

      .price-cell .label {
        display: block;
        font-size: 10px;
        color: var(--text-faint);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .price-cell .value {
        font-size: 18px;
        color: var(--text-strong);
      }

      .summary-card h2,
      .collection-card h2,
      .stats-card h2,
      .similar-card h2 {
        font-size: 12px;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
      }

      .summary-text {
        font-size: 13px;
        line-height: 1.7;
        color: var(--text-soft);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat-cell {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 4px;
        padding: 12px;
        background: rgba(15, 56, 15, 0.14);
      }

      .stat-cell .label {
        display: block;
        font-size: 10px;
        color: var(--text-faint);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .stat-cell .value {
        font-size: 14px;
        color: var(--text-strong);
      }

      .collection-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .collection-state {
        font-size: 12px;
        color: var(--text-soft);
      }

      .similar-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .mini-card {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 5px;
        background: rgba(15, 56, 15, 0.12);
        padding: 12px;
        text-decoration: none;
        color: inherit;
      }

      .mini-card:hover {
        border-color: var(--panel-line-strong);
      }

      .mini-card h3 {
        font-size: 12px;
        color: var(--text-strong);
        margin-bottom: 8px;
      }

      .mini-card p {
        font-size: 11px;
        color: var(--text-soft);
      }

      .status-text {
        font-size: 11px;
        color: var(--text-faint);
        min-height: 16px;
      }

      .price-history {
        margin-top: 2rem;
        padding: 1rem;
        border: 1px solid #306230;
      }

      .price-history h3 {
        color: #9bbc0f;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      .trend-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }

      .trend-badge {
        padding: 0.2rem 0.6rem;
        font-size: 0.65rem;
        border: 1px solid #306230;
        color: #9bbc0f;
      }

      .trend-badge.up {
        border-color: #9bbc0f;
        color: #9bbc0f;
      }

      .trend-badge.up::before {
        content: "↑ ";
      }

      .trend-badge.down {
        border-color: #e85555;
        color: #e85555;
      }

      .trend-badge.down::before {
        content: "↓ ";
      }

      .trend-badge.stable {
        border-color: #8bac0f;
      }

      .trend-badge.stable::before {
        content: "= ";
      }

      .chart-toggle {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
      }

      .chart-btn {
        background: none;
        border: 1px solid #306230;
        color: #306230;
        padding: 0.2rem 0.75rem;
        font-size: 0.65rem;
        cursor: pointer;
      }

      .chart-btn.active {
        border-color: #9bbc0f;
        color: #9bbc0f;
        background: #0a1a0a;
      }

      .chart-container {
        position: relative;
        background: #0a0a0a;
        border: 1px solid #1a3a1a;
      }

      #price-chart {
        width: 100%;
        height: 160px;
      }

      .chart-labels {
        display: flex;
        justify-content: space-between;
        padding: 0.25rem 0.5rem;
        gap: 8px;
      }

      .chart-label {
        font-size: 0.55rem;
        color: #306230;
      }

      .price-stats-row {
        display: flex;
        gap: 1rem;
        margin-top: 0.75rem;
      }

      .price-stat {
        flex: 1;
        text-align: center;
        padding: 0.5rem;
        border: 1px solid #1a3a1a;
      }

      .stat-label {
        display: block;
        font-size: 0.55rem;
        color: #306230;
        margin-bottom: 0.25rem;
      }

      .stat-value {
        font-size: 0.9rem;
        color: #9bbc0f;
        font-weight: bold;
      }

      .price-compare {
        margin-top: 2rem;
        padding: 1rem;
        border: 1px solid #306230;
        background: rgba(10, 10, 10, 0.24);
      }

      .price-compare h3 {
        color: #9bbc0f;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      .compare-table {
        width: 100%;
      }

      .compare-row {
        display: grid;
        grid-template-columns: 2fr 1fr 0.7fr 0.7fr 0.8fr;
        gap: 0.5rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #1a3a1a;
        font-size: 0.7rem;
        align-items: center;
      }

      .compare-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .compare-header {
        color: #306230;
        font-size: 0.6rem;
        letter-spacing: 0.05em;
      }

      .compare-row.current {
        background: #0a1a0a;
        color: #9bbc0f;
      }

      .compare-row.clickable:hover {
        background: #0a1a0a;
      }

      .loading-card {
        padding: 32px 20px;
        text-align: center;
        color: var(--text-faint);
        border: 1px dashed rgba(155, 188, 15, 0.18);
        border-radius: 6px;
      }

      @media (max-width: 900px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }

        .stats-grid,
        .similar-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .price-table,
        .stats-grid,
        .similar-grid,
        .price-stats-row {
          grid-template-columns: 1fr;
        }

        .price-stats-row {
          display: grid;
        }

        .compare-row {
          grid-template-columns: 1.5fr 1fr 0.8fr 0.8fr 0.9fr;
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="detail-shell">
      <nav class="top-nav">
        <a id="catalog-back-link" href="/games-list.html" class="btn">← Catalogue</a>
        <a href="/hub.html" class="btn">← Hub</a>
      </nav>

      <section id="hero" class="hero-card">
        <div class="loading-card">Chargement...</div>
      </section>

      <section class="summary-card">
        <h2>Résumé</h2>
        <div id="summary" class="summary-text">Chargement...</div>
      </section>

      <section class="stats-card">
        <h2>Statistiques</h2>
        <div id="stats-row" class="stats-grid"></div>
      </section>

      <section class="collection-card">
        <h2>Collection</h2>
        <div class="collection-row">
          <div id="collection-state" class="collection-state">Chargement...</div>
          <button id="collection-button" type="button" class="btn" disabled>Chargement...</button>
        </div>
        <div id="collection-status" class="status-text"></div>
      </section>

      <section class="similar-card">
        <h2>Jeux similaires</h2>
        <div id="similar-games" class="similar-grid"></div>
      </section>
    </main>

    <script>
      const heroEl = document.getElementById("hero");
      const summaryEl = document.getElementById("summary");
      const statsRowEl = document.getElementById("stats-row");
      const collectionStateEl = document.getElementById("collection-state");
      const collectionButtonEl = document.getElementById("collection-button");
      const collectionStatusEl = document.getElementById("collection-status");
      const similarGamesEl = document.getElementById("similar-games");
      const catalogBackLinkEl = document.getElementById("catalog-back-link");
      const detailShellEl = document.querySelector(".detail-shell, main, .content");

      let currentGame = null;
      let currentCollectionItem = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatPrice(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `$${number}` : "n/a";
      }

      function rarityClass(value) {
        return String(value || "COMMON").toLowerCase();
      }

      function getGameId() {
        return new URLSearchParams(window.location.search).get("id") || "";
      }

      function buildCatalogueBackLink() {
        const params = new URLSearchParams(window.location.search);
        params.delete("id");
        const query = params.toString();
        catalogBackLinkEl.href = query ? `/games-list.html?${query}` : "/games-list.html";
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.error || `${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      function renderHero(game) {
        heroEl.innerHTML = `
          <div class="hero-grid">
            <div>
              <h1 class="hero-title">${escapeHtml(game.title)}</h1>
              <div class="hero-meta">
                <span class="pill">${escapeHtml(game.console || "Console inconnue")}</span>
                <span class="pill">${escapeHtml(game.year || "n/a")}</span>
                <span class="pill">${escapeHtml(game.genre || "Genre inconnu")}</span>
                <span class="rarity-badge rarity-${escapeHtml(rarityClass(game.rarity))}">${escapeHtml(game.rarity || "COMMON")}</span>
              </div>
              <div class="developer-line">Développé par ${escapeHtml(game.developer || "studio inconnu")}</div>
            </div>
            <aside class="price-panel">
              <div class="price-top">
                <div>
                  <div style="font-size:10px;color:rgba(155,188,15,0.4);text-transform:uppercase;letter-spacing:0.08em;">Prix collection</div>
                </div>
                <div class="metascore-circle">
                  <strong>${escapeHtml(game.metascore || "—")}</strong>
                  <span>METASCORE</span>
                </div>
              </div>
              <div class="price-table">
                <div class="price-cell"><span class="label">Loose</span><span class="value">${escapeHtml(formatPrice(game.loosePrice))}</span></div>
                <div class="price-cell"><span class="label">CIB</span><span class="value">${escapeHtml(formatPrice(game.cibPrice))}</span></div>
                <div class="price-cell"><span class="label">Mint</span><span class="value">${escapeHtml(formatPrice(game.mintPrice))}</span></div>
              </div>
            </aside>
          </div>
          <section class="price-history">
            <h3>HISTORIQUE DES PRIX - 12 MOIS</h3>
            <div class="trend-row">
              <span class="trend-badge" id="trend-loose">Loose —</span>
              <span class="trend-badge" id="trend-cib">CIB —</span>
              <span class="trend-badge" id="trend-mint">Mint —</span>
            </div>
            <div class="chart-toggle">
              <button class="chart-btn active" data-type="mint">Mint</button>
              <button class="chart-btn" data-type="cib">CIB</button>
              <button class="chart-btn" data-type="loose">Loose</button>
            </div>
            <div class="chart-container">
              <svg id="price-chart" viewBox="0 0 600 160" preserveAspectRatio="none"></svg>
              <div class="chart-labels" id="chart-labels"></div>
            </div>
            <div class="price-stats-row">
              <div class="price-stat">
                <span class="stat-label">12M MIN</span>
                <span class="stat-value" id="stat-min">—</span>
              </div>
              <div class="price-stat">
                <span class="stat-label">12M MAX</span>
                <span class="stat-value" id="stat-max">—</span>
              </div>
              <div class="price-stat">
                <span class="stat-label">VARIATION</span>
                <span class="stat-value" id="stat-variation">—</span>
              </div>
            </div>
          </section>
        `;
      }

      function renderSummary(game) {
        summaryEl.textContent = game.summary || "Aucun résumé éditorial disponible.";
      }

      function renderStats(game) {
        const stats = [
          ["Metascore", game.metascore || "—"],
          ["Rareté", game.rarity || "COMMON"],
          ["Développeur", game.developer || "n/a"],
          ["Année", game.year || "n/a"],
        ];

        statsRowEl.innerHTML = stats.map(([label, value]) => `
          <div class="stat-cell">
            <span class="label">${escapeHtml(label)}</span>
            <span class="value">${escapeHtml(value)}</span>
          </div>
        `).join("");
      }

      async function refreshCollectionStatus() {
        if (!currentGame) {
          return;
        }

        try {
          const payload = await fetchJson("/api/collection");
          currentCollectionItem = (payload.items || []).find((item) => item.gameId === currentGame.id) || null;
          if (currentCollectionItem) {
            collectionStateEl.textContent = "Dans votre collection ✓";
            collectionButtonEl.textContent = "Retirer";
            collectionButtonEl.disabled = false;
          } else {
            collectionStateEl.textContent = "Ce jeu n'est pas encore dans votre collection.";
            collectionButtonEl.textContent = "Ajouter à ma collection";
            collectionButtonEl.disabled = false;
          }
        } catch (error) {
          collectionStateEl.textContent = `Impossible de charger la collection (${error.message}).`;
          collectionButtonEl.disabled = true;
        }
      }

      async function handleCollectionAction() {
        if (!currentGame) {
          return;
        }

        collectionButtonEl.disabled = true;
        collectionStatusEl.textContent = "Mise à jour...";

        try {
          if (currentCollectionItem) {
            await fetchJson(`/api/collection/${encodeURIComponent(currentCollectionItem.id)}`, {
              method: "DELETE",
            });
            collectionStatusEl.textContent = "Jeu retiré de votre collection.";
          } else {
            await fetchJson("/api/collection", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ gameId: currentGame.id }),
            });
            collectionStatusEl.textContent = "Jeu ajouté à votre collection.";
          }

          await refreshCollectionStatus();
        } catch (error) {
          collectionStatusEl.textContent = `Erreur collection: ${error.message}`;
          collectionButtonEl.disabled = false;
        }
      }

      function renderSimilarGames(items) {
        if (!items.length) {
          similarGamesEl.innerHTML = '<div class="loading-card">Aucun jeu similaire trouvé.</div>';
          return;
        }

        similarGamesEl.innerHTML = items.map((game) => `
          <a class="mini-card" href="/game-detail.html?id=${encodeURIComponent(game.id)}">
            <h3>${escapeHtml(game.title)}</h3>
            <p>${escapeHtml(game.console || "Console inconnue")} · ${escapeHtml(game.year || "n/a")}</p>
            <p>${escapeHtml(game.genre || "Genre inconnu")}</p>
          </a>
        `).join("");
      }

      function removeRelatedPricesSection() {
        document.querySelector(".price-compare")?.remove();
      }

      function extractSeries(title) {
        const normalized = String(title || "")
          .replace(/[:\-]/g, " ")
          .replace(/\b(19|20)\d{2}\b/g, " ")
          .replace(/\b(?:I|II|III|IV|V|VI|VII|VIII|IX|X)\b/gi, " ")
          .replace(/[^\w\s]/g, " ")
          .replace(/\s+/g, " ")
          .trim();

        if (!normalized) {
          return "";
        }

        const words = normalized.split(" ").filter(Boolean);
        while (words.length && ["super", "the", "new"].includes(words[0].toLowerCase())) {
          words.shift();
        }

        if (words.length >= 2) {
          const compound = `${words[0].toLowerCase()} ${words[1].toLowerCase()}`;
          if (["final fantasy", "dragon quest", "mega man", "metal gear"].includes(compound)) {
            return `${words[0]} ${words[1]}`;
          }
        }

        return words[0] || "";
      }

      function renderRelatedPrices(current, related) {
        removeRelatedPricesSection();
        if (!detailShellEl) {
          return;
        }

        const section = document.createElement("section");
        section.className = "price-compare";
        section.innerHTML = `
          <h3>MEME FRANCHISE - AUTRES VERSIONS</h3>
          <div class="compare-table">
            <div class="compare-row compare-header">
              <span>Titre</span>
              <span>Console</span>
              <span>Loose</span>
              <span>Mint</span>
              <span>Rarete</span>
            </div>
            <div class="compare-row current">
              <span>${escapeHtml(current.title)}</span>
              <span>${escapeHtml(current.console || "n/a")}</span>
              <span>${escapeHtml(formatPrice(current.loosePrice))}</span>
              <span>${escapeHtml(formatPrice(current.mintPrice))}</span>
              <span class="rarity-badge rarity-${escapeHtml(rarityClass(current.rarity))}">${escapeHtml(current.rarity || "COMMON")}</span>
            </div>
            ${related.map((game) => `
              <div class="compare-row clickable" onclick="window.location='/game-detail.html?id=${encodeURIComponent(game.id)}'" style="cursor:pointer">
                <span>${escapeHtml(game.title)}</span>
                <span>${escapeHtml(game.console || "n/a")}</span>
                <span>${escapeHtml(formatPrice(game.loosePrice))}</span>
                <span>${escapeHtml(formatPrice(game.mintPrice))}</span>
                <span class="rarity-badge rarity-${escapeHtml(rarityClass(game.rarity))}">${escapeHtml(game.rarity || "COMMON")}</span>
              </div>
            `).join("")}
          </div>
        `;

        detailShellEl.appendChild(section);
      }

      async function loadRelatedGames(currentGame) {
        removeRelatedPricesSection();
        const series = extractSeries(currentGame?.title);
        if (!series || series.length < 3) {
          return;
        }

        try {
          const data = await fetchJson(`/api/games?q=${encodeURIComponent(series)}&limit=50`);
          const normalizedSeries = series.toLowerCase();
          const currentTitle = String(currentGame.title || "").toLowerCase();
          const spinOffKeywords = ["party", "kart", "golf", "tennis", "tactics", "legend", "revenant", "& luigi", "paper mario"];
          const related = (data.items || [])
            .filter((game) => game.id !== currentGame.id)
            .filter((game) => String(game.title || "").toLowerCase().includes(normalizedSeries))
            .sort((left, right) => {
              const score = (game) => {
                const title = String(game.title || "").toLowerCase();
                let total = 0;
                if (title.startsWith(normalizedSeries)) total += 20;
                if (currentTitle.startsWith("super mario") && title.startsWith("super mario")) total += 40;
                if (String(game.console || "").toLowerCase() === String(currentGame.console || "").toLowerCase()) total += 15;
                if (spinOffKeywords.some((keyword) => title.includes(keyword))) total -= 25;
                total -= Math.abs(title.length - currentTitle.length) * 0.1;
                return total;
              };
              return score(right) - score(left);
            })
            .slice(0, 4);

          if (related.length < 2) {
            return;
          }

          renderRelatedPrices(currentGame, related);
        } catch (error) {
          console.warn("[RetroDex] Related franchise lookup failed:", error.message);
        }
      }

      async function loadSimilarGames(game) {
        try {
          const payload = await fetchJson(`/api/games?console=${encodeURIComponent(game.console)}&limit=8`);
          const similar = (payload.items || []).filter((item) => item.id !== game.id).slice(0, 4);
          renderSimilarGames(similar);
        } catch (error) {
          similarGamesEl.innerHTML = `<div class="loading-card">Impossible de charger les jeux similaires (${escapeHtml(error.message)}).</div>`;
        }
      }

      async function loadPriceHistory(gameId) {
        const response = await fetch(`/api/games/${encodeURIComponent(gameId)}/price-history`);
        if (!response.ok) {
          return;
        }

        const data = await response.json();

        ["loose", "cib", "mint"].forEach((type) => {
          const badge = document.getElementById(`trend-${type}`);
          if (!badge) {
            return;
          }
          const trend = data.trend?.[type] || "stable";
          badge.textContent = type.toUpperCase();
          badge.classList.remove("up", "down", "stable");
          badge.classList.add(trend);
        });

        let activeType = "mint";

        function drawChart(type) {
          const prices = (data.history || []).map((entry) => Number(entry[type]) || 0);
          if (!prices.length) {
            return;
          }

          const min = Math.min(...prices);
          const max = Math.max(...prices);
          const range = max - min || 1;
          const width = 600;
          const height = 160;
          const pad = 10;

          const points = prices.map((price, index) => {
            const x = pad + (index / (prices.length - 1)) * (width - pad * 2);
            const y = height - pad - ((price - min) / range) * (height - pad * 2);
            return `${x},${y}`;
          }).join(" ");

          const svg = document.getElementById("price-chart");
          if (!svg) {
            return;
          }

          svg.innerHTML = `
            <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="#1a3a1a" stroke-width="1"/>
            <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="#1a3a1a" stroke-width="1"/>
            <polygon points="${pad},${height - pad} ${points} ${width - pad},${height - pad}" fill="#0a1a0a" opacity="0.6"/>
            <polyline points="${points}" fill="none" stroke="#9bbc0f" stroke-width="2" stroke-linejoin="round"/>
            ${prices.map((price, index) => {
              const x = pad + (index / (prices.length - 1)) * (width - pad * 2);
              const y = height - pad - ((price - min) / range) * (height - pad * 2);
              return `<circle cx="${x}" cy="${y}" r="3" fill="#9bbc0f"/>`;
            }).join("")}
            <text x="${pad + 4}" y="${height - pad - 4}" fill="#306230" font-size="10">$${min}</text>
            <text x="${pad + 4}" y="${pad + 12}" fill="#9bbc0f" font-size="10">$${max}</text>
          `;

          const labels = document.getElementById("chart-labels");
          if (labels) {
            labels.innerHTML = (data.history || [])
              .filter((_, index) => index % 3 === 0 || index === 11)
              .map((entry) => `<span class="chart-label">${entry.month}</span>`)
              .join("");
          }

          const oldest = prices[0] || 1;
          const variation = ((prices[prices.length - 1] - oldest) / oldest * 100).toFixed(1);
          const variationEl = document.getElementById("stat-variation");

          document.getElementById("stat-min").textContent = `$${min}`;
          document.getElementById("stat-max").textContent = `$${max}`;
          variationEl.textContent = `${variation > 0 ? "+" : ""}${variation}%`;
          variationEl.style.color = variation > 0 ? "#9bbc0f" : variation < 0 ? "#e85555" : "#8bac0f";
        }

        drawChart(activeType);

        document.querySelectorAll(".chart-btn").forEach((button) => {
          button.addEventListener("click", () => {
            document.querySelectorAll(".chart-btn").forEach((item) => item.classList.remove("active"));
            button.classList.add("active");
            activeType = button.dataset.type;
            drawChart(activeType);
          });
        });
      }

      async function loadPage() {
        const gameId = getGameId();
        buildCatalogueBackLink();

        if (!gameId) {
          heroEl.innerHTML = '<div class="loading-card">Aucun identifiant de jeu fourni.</div>';
          summaryEl.textContent = "Impossible de charger cette fiche sans identifiant.";
          return;
        }

        try {
          currentGame = await fetchJson(`/api/games/${encodeURIComponent(gameId)}`);
          document.title = `RetroDex — ${currentGame.title}`;
          renderHero(currentGame);
          renderSummary(currentGame);
          renderStats(currentGame);
          collectionButtonEl.addEventListener("click", handleCollectionAction);
          await refreshCollectionStatus();
          await loadPriceHistory(currentGame.id);
          await loadRelatedGames(currentGame);
          await loadSimilarGames(currentGame);
        } catch (error) {
          heroEl.innerHTML = `<div class="loading-card">Impossible de charger la fiche (${escapeHtml(error.message)}).</div>`;
          summaryEl.textContent = "Erreur de chargement.";
          statsRowEl.innerHTML = "";
          similarGamesEl.innerHTML = '<div class="loading-card">Jeux similaires indisponibles.</div>';
          collectionStateEl.textContent = "Fiche indisponible.";
          collectionButtonEl.disabled = true;
          collectionButtonEl.textContent = "Indisponible";
        }
      }

      loadPage();
    </script>
  </body>
</html>

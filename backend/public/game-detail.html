<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#9bbc0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroDex">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>RetroDex — Fiche jeu</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      .trend-badge.up::before { content: "\2191 "; }
      .trend-badge.down::before { content: "\2193 "; }
      .trend-badge.stable::before { content: "= "; }
    </style>
  </head>
  <body>
    <main class="detail-shell">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <a id="catalog-back-link" href="/games-list.html">CATALOGUE</a>
        <span class="sep">&rsaquo;</span>
        <span class="current" id="breadcrumb-title">—</span>
      </nav>

      <section id="hero" class="hero-card">
        <div class="loading-card">Chargement...</div>
      </section>

      <section class="summary-card">
        <h2>Résumé</h2>
        <div id="summary" class="summary-text">Chargement...</div>
      </section>

      <section class="stats-card">
        <h2>Statistiques</h2>
        <div id="stats-row" class="stats-grid"></div>
      </section>

      <section class="collection-card">
        <h2>Collection</h2>
        <div class="collection-row">
          <div>
            <div id="collection-state" class="collection-state">Chargement...</div>
            <div id="collection-current-meta" class="collection-current-meta"></div>
          </div>
          <button id="collection-button" type="button" class="btn" disabled>Chargement...</button>
        </div>
        <div id="collection-form" class="collection-form">
          <div class="collection-controls">
            <select id="collection-condition" class="collection-condition-select" aria-label="État du jeu">
              <option value="Loose">Loose</option>
              <option value="CIB">CIB</option>
              <option value="Mint">Mint</option>
            </select>
          </div>
          <input
            id="collection-notes"
            class="collection-note-input"
            type="text"
            maxlength="160"
            placeholder="Notes optionnelles..."
          />
        </div>
        <div id="collection-status" class="status-text"></div>
      </section>

      <section class="contribute-section">
        <h3>CONTRIBUER UN PRIX</h3>
        <p class="contribute-desc">
          Vous avez acheté ou vendu ce jeu ? Partagez le prix.
        </p>
        <div class="contribute-form">
          <select id="contrib-condition">
            <option value="Loose">Loose</option>
            <option value="CIB">CIB</option>
            <option value="Mint">Mint</option>
          </select>
          <input type="number" id="contrib-price"
            placeholder="Prix en $ (ex: 45)" min="1" step="0.01" />
          <select id="contrib-context">
            <option value="ebay">eBay</option>
            <option value="vinted">Vinted</option>
            <option value="brocante">Brocante</option>
            <option value="leboncoin">Leboncoin</option>
            <option value="autre">Autre</option>
          </select>
          <input type="date" id="contrib-date" />
          <textarea id="contrib-note"
            placeholder="Note optionnelle..." rows="2"></textarea>
          <button id="contrib-submit" type="button">SOUMETTRE</button>
        </div>
        <div id="contrib-feedback" class="hidden"></div>
      </section>

    </main>

    <script src="/js/game-detail.js"></script>
<div class="footer-attribution">
  Covers : <a href="https://www.igdb.com" target="_blank" rel="noopener noreferrer">IGDB.com</a>
</div>
</body>
</html>

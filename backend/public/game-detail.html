<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex — Fiche jeu</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --panel-bg: rgba(15, 56, 15, 0.2);
        --panel-line: rgba(155, 188, 15, 0.18);
        --panel-line-strong: rgba(155, 188, 15, 0.4);
        --text-strong: #cfe66f;
        --text-soft: rgba(155, 188, 15, 0.65);
        --text-faint: rgba(155, 188, 15, 0.42);
        --legendary: #ffd700;
        --epic: #9b59b6;
        --rare: #e74c3c;
        --uncommon: rgba(155, 188, 15, 0.7);
        --common: rgba(155, 188, 15, 0.18);
      }

      .detail-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .top-nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hero-card,
      .summary-card,
      .collection-card,
      .similar-card,
      .stats-card {
        background: var(--panel-bg);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 18px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
        gap: 16px;
        align-items: start;
      }

      .hero-title {
        font-size: 30px;
        color: var(--text-strong);
        margin-bottom: 10px;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .pill,
      .rarity-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .pill {
        border: 1px solid rgba(155, 188, 15, 0.22);
        background: rgba(155, 188, 15, 0.08);
        color: rgba(155, 188, 15, 0.76);
      }

      .rarity-badge {
        border: 1px solid currentColor;
        background: rgba(10, 10, 10, 0.35);
        text-transform: uppercase;
      }

      .rarity-badge.legendary { color: var(--legendary); }
      .rarity-badge.epic { color: var(--epic); }
      .rarity-badge.rare { color: var(--rare); }
      .rarity-badge.uncommon { color: rgba(155, 188, 15, 0.9); }
      .rarity-badge.common { color: rgba(155, 188, 15, 0.65); }

      .developer-line {
        font-size: 12px;
        color: var(--text-soft);
      }

      .price-panel {
        background: rgba(10, 10, 10, 0.38);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 16px;
      }

      .price-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }

      .metascore-circle {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 2px solid rgba(155, 188, 15, 0.4);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--text-strong);
      }

      .metascore-circle strong {
        font-size: 20px;
        line-height: 1;
      }

      .metascore-circle span {
        font-size: 9px;
        color: var(--text-faint);
        letter-spacing: 0.08em;
      }

      .price-table {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .price-cell {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 4px;
        padding: 12px;
        background: rgba(15, 56, 15, 0.18);
      }

      .price-cell .label {
        display: block;
        font-size: 10px;
        color: var(--text-faint);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .price-cell .value {
        font-size: 18px;
        color: var(--text-strong);
      }

      .summary-card h2,
      .collection-card h2,
      .stats-card h2,
      .similar-card h2 {
        font-size: 12px;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
      }

      .summary-text {
        font-size: 13px;
        line-height: 1.7;
        color: var(--text-soft);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat-cell {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 4px;
        padding: 12px;
        background: rgba(15, 56, 15, 0.14);
      }

      .stat-cell .label {
        display: block;
        font-size: 10px;
        color: var(--text-faint);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .stat-cell .value {
        font-size: 14px;
        color: var(--text-strong);
      }

      .collection-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .collection-state {
        font-size: 12px;
        color: var(--text-soft);
      }

      .similar-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .mini-card {
        border: 1px solid rgba(155, 188, 15, 0.16);
        border-radius: 5px;
        background: rgba(15, 56, 15, 0.12);
        padding: 12px;
        text-decoration: none;
        color: inherit;
      }

      .mini-card:hover {
        border-color: var(--panel-line-strong);
      }

      .mini-card h3 {
        font-size: 12px;
        color: var(--text-strong);
        margin-bottom: 8px;
      }

      .mini-card p {
        font-size: 11px;
        color: var(--text-soft);
      }

      .status-text {
        font-size: 11px;
        color: var(--text-faint);
        min-height: 16px;
      }

      .loading-card {
        padding: 32px 20px;
        text-align: center;
        color: var(--text-faint);
        border: 1px dashed rgba(155, 188, 15, 0.18);
        border-radius: 6px;
      }

      @media (max-width: 900px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }

        .stats-grid,
        .similar-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .price-table,
        .stats-grid,
        .similar-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="detail-shell">
      <nav class="top-nav">
        <a id="catalog-back-link" href="/games-list.html" class="btn">← Catalogue</a>
        <a href="/hub.html" class="btn">← Hub</a>
      </nav>

      <section id="hero" class="hero-card">
        <div class="loading-card">Chargement...</div>
      </section>

      <section class="summary-card">
        <h2>Résumé</h2>
        <div id="summary" class="summary-text">Chargement...</div>
      </section>

      <section class="stats-card">
        <h2>Statistiques</h2>
        <div id="stats-row" class="stats-grid"></div>
      </section>

      <section class="collection-card">
        <h2>Collection</h2>
        <div class="collection-row">
          <div id="collection-state" class="collection-state">Chargement...</div>
          <button id="collection-button" type="button" class="btn" disabled>Chargement...</button>
        </div>
        <div id="collection-status" class="status-text"></div>
      </section>

      <section class="similar-card">
        <h2>Jeux similaires</h2>
        <div id="similar-games" class="similar-grid"></div>
      </section>
    </main>

    <script>
      const heroEl = document.getElementById("hero");
      const summaryEl = document.getElementById("summary");
      const statsRowEl = document.getElementById("stats-row");
      const collectionStateEl = document.getElementById("collection-state");
      const collectionButtonEl = document.getElementById("collection-button");
      const collectionStatusEl = document.getElementById("collection-status");
      const similarGamesEl = document.getElementById("similar-games");
      const catalogBackLinkEl = document.getElementById("catalog-back-link");

      let currentGame = null;
      let currentCollectionItem = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatPrice(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `$${number}` : "n/a";
      }

      function rarityClass(value) {
        return String(value || "COMMON").toLowerCase();
      }

      function getGameId() {
        return new URLSearchParams(window.location.search).get("id") || "";
      }

      function buildCatalogueBackLink() {
        const params = new URLSearchParams(window.location.search);
        params.delete("id");
        const query = params.toString();
        catalogBackLinkEl.href = query ? `/games-list.html?${query}` : "/games-list.html";
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.error || `${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      function renderHero(game) {
        heroEl.innerHTML = `
          <div class="hero-grid">
            <div>
              <h1 class="hero-title">${escapeHtml(game.title)}</h1>
              <div class="hero-meta">
                <span class="pill">${escapeHtml(game.console || "Console inconnue")}</span>
                <span class="pill">${escapeHtml(game.year || "n/a")}</span>
                <span class="pill">${escapeHtml(game.genre || "Genre inconnu")}</span>
                <span class="rarity-badge ${escapeHtml(rarityClass(game.rarity))}">${escapeHtml(game.rarity || "COMMON")}</span>
              </div>
              <div class="developer-line">Développé par ${escapeHtml(game.developer || "studio inconnu")}</div>
            </div>
            <aside class="price-panel">
              <div class="price-top">
                <div>
                  <div style="font-size:10px;color:rgba(155,188,15,0.4);text-transform:uppercase;letter-spacing:0.08em;">Prix collection</div>
                  <div style="font-size:16px;color:#cfe66f;margin-top:4px;">État du marché</div>
                </div>
                <div class="metascore-circle">
                  <strong>${escapeHtml(game.metascore || "—")}</strong>
                  <span>METASCORE</span>
                </div>
              </div>
              <div class="price-table">
                <div class="price-cell"><span class="label">Loose</span><span class="value">${escapeHtml(formatPrice(game.loosePrice))}</span></div>
                <div class="price-cell"><span class="label">CIB</span><span class="value">${escapeHtml(formatPrice(game.cibPrice))}</span></div>
                <div class="price-cell"><span class="label">Mint</span><span class="value">${escapeHtml(formatPrice(game.mintPrice))}</span></div>
              </div>
            </aside>
          </div>
        `;
      }

      function renderSummary(game) {
        summaryEl.textContent = game.summary || "Aucun résumé éditorial disponible.";
      }

      function renderStats(game) {
        const stats = [
          ["Metascore", game.metascore || "—"],
          ["Rareté", game.rarity || "COMMON"],
          ["Développeur", game.developer || "n/a"],
          ["Année", game.year || "n/a"],
        ];

        statsRowEl.innerHTML = stats.map(([label, value]) => `
          <div class="stat-cell">
            <span class="label">${escapeHtml(label)}</span>
            <span class="value">${escapeHtml(value)}</span>
          </div>
        `).join("");
      }

      async function refreshCollectionStatus() {
        if (!currentGame) {
          return;
        }

        try {
          const payload = await fetchJson("/api/collection");
          currentCollectionItem = (payload.items || []).find((item) => item.gameId === currentGame.id) || null;
          if (currentCollectionItem) {
            collectionStateEl.textContent = "Dans votre collection ✓";
            collectionButtonEl.textContent = "Retirer";
            collectionButtonEl.disabled = false;
          } else {
            collectionStateEl.textContent = "Ce jeu n'est pas encore dans votre collection.";
            collectionButtonEl.textContent = "Ajouter à ma collection";
            collectionButtonEl.disabled = false;
          }
        } catch (error) {
          collectionStateEl.textContent = `Impossible de charger la collection (${error.message}).`;
          collectionButtonEl.disabled = true;
        }
      }

      async function handleCollectionAction() {
        if (!currentGame) {
          return;
        }

        collectionButtonEl.disabled = true;
        collectionStatusEl.textContent = "Mise à jour...";

        try {
          if (currentCollectionItem) {
            await fetchJson(`/api/collection/${encodeURIComponent(currentCollectionItem.id)}`, {
              method: "DELETE",
            });
            collectionStatusEl.textContent = "Jeu retiré de votre collection.";
          } else {
            await fetchJson("/api/collection", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ gameId: currentGame.id }),
            });
            collectionStatusEl.textContent = "Jeu ajouté à votre collection.";
          }

          await refreshCollectionStatus();
        } catch (error) {
          collectionStatusEl.textContent = `Erreur collection: ${error.message}`;
          collectionButtonEl.disabled = false;
        }
      }

      function renderSimilarGames(items) {
        if (!items.length) {
          similarGamesEl.innerHTML = '<div class="loading-card">Aucun jeu similaire trouvé.</div>';
          return;
        }

        similarGamesEl.innerHTML = items.map((game) => `
          <a class="mini-card" href="/game-detail.html?id=${encodeURIComponent(game.id)}">
            <h3>${escapeHtml(game.title)}</h3>
            <p>${escapeHtml(game.console || "Console inconnue")} · ${escapeHtml(game.year || "n/a")}</p>
            <p>${escapeHtml(game.genre || "Genre inconnu")}</p>
          </a>
        `).join("");
      }

      async function loadSimilarGames(game) {
        try {
          const payload = await fetchJson(`/api/games?console=${encodeURIComponent(game.console)}&limit=8`);
          const similar = (payload.items || []).filter((item) => item.id !== game.id).slice(0, 4);
          renderSimilarGames(similar);
        } catch (error) {
          similarGamesEl.innerHTML = `<div class="loading-card">Impossible de charger les jeux similaires (${escapeHtml(error.message)}).</div>`;
        }
      }

      async function loadPage() {
        const gameId = getGameId();
        buildCatalogueBackLink();

        if (!gameId) {
          heroEl.innerHTML = '<div class="loading-card">Aucun identifiant de jeu fourni.</div>';
          summaryEl.textContent = "Impossible de charger cette fiche sans identifiant.";
          return;
        }

        try {
          currentGame = await fetchJson(`/api/games/${encodeURIComponent(gameId)}`);
          document.title = `RetroDex — ${currentGame.title}`;
          renderHero(currentGame);
          renderSummary(currentGame);
          renderStats(currentGame);
          collectionButtonEl.addEventListener("click", handleCollectionAction);
          await refreshCollectionStatus();
          await loadSimilarGames(currentGame);
        } catch (error) {
          heroEl.innerHTML = `<div class="loading-card">Impossible de charger la fiche (${escapeHtml(error.message)}).</div>`;
          summaryEl.textContent = "Erreur de chargement.";
          statsRowEl.innerHTML = "";
          similarGamesEl.innerHTML = '<div class="loading-card">Jeux similaires indisponibles.</div>';
          collectionStateEl.textContent = "Fiche indisponible.";
          collectionButtonEl.disabled = true;
          collectionButtonEl.textContent = "Indisponible";
        }
      }

      loadPage();
    </script>
  </body>
</html>

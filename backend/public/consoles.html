<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#9bbc0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RetroDex" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>RetroDex - Consoles</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --panel-bg: rgba(15, 56, 15, 0.2);
        --panel-line: rgba(155, 188, 15, 0.18);
        --panel-line-strong: rgba(155, 188, 15, 0.42);
        --text-strong: #cfe66f;
        --text-soft: rgba(155, 188, 15, 0.62);
        --text-faint: rgba(155, 188, 15, 0.4);
      }

      .console-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .console-header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
        padding: 10px 0 18px;
        border-bottom: 1px solid rgba(155, 188, 15, 0.16);
      }

      .console-header h1 {
        font-size: 26px;
        color: var(--text-strong);
        letter-spacing: 0.12em;
        margin: 10px 0 6px;
      }

      .console-header p {
        margin: 0;
        font-size: 11px;
        color: var(--text-faint);
      }

      .status-strip,
      .summary-panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 14px 16px;
      }

      .status-strip {
        font-size: 11px;
        color: var(--text-faint);
      }

      .status-strip strong,
      .summary-panel strong {
        color: var(--text-strong);
      }

      .consoles-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .console-card {
        background: rgba(15, 56, 15, 0.16);
        border: 1px solid var(--panel-line);
        border-radius: 6px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .console-card h3 {
        margin: 0;
        font-size: 18px;
        color: var(--text-strong);
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .meta-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(155, 188, 15, 0.24);
        background: rgba(10, 10, 10, 0.38);
        color: rgba(155, 188, 15, 0.78);
        font-size: 10px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .games-count {
        text-align: right;
        min-width: 110px;
      }

      .games-count .value {
        display: block;
        font-size: 30px;
        line-height: 1;
        color: var(--text-strong);
      }

      .games-count .label {
        display: block;
        margin-top: 4px;
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .maker-line {
        font-size: 11px;
        color: var(--text-soft);
      }

      .bar-track {
        width: 100%;
        height: 10px;
        background: rgba(10, 10, 10, 0.4);
        border: 1px solid rgba(155, 188, 15, 0.12);
        border-radius: 999px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, rgba(139, 172, 15, 0.7), #9bbc0f);
      }

      .bar-caption {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 10px;
        color: var(--text-faint);
      }

      .summary-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 11px;
        color: var(--text-soft);
        padding-bottom: 24px;
      }

      .empty-state {
        padding: 32px 20px;
        text-align: center;
        border: 1px dashed rgba(155, 188, 15, 0.18);
        border-radius: 6px;
        color: var(--text-faint);
        background: rgba(15, 56, 15, 0.08);
      }

      @media (max-width: 760px) {
        .consoles-grid {
          grid-template-columns: 1fr;
        }

        .card-head {
          flex-direction: column;
        }

        .games-count {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="console-shell">
      <header class="console-header">
        <div>
          <a href="/hub.html" class="btn">&larr; Hub</a>
          <h1>CONSOLES</h1>
          <p id="page-subtitle">16 systemes retro</p>
        </div>
      </header>

      <section id="status-bar" class="status-strip">Chargement des consoles...</section>

      <section id="results" class="consoles-grid"></section>

      <section id="summary" class="summary-panel"></section>
    </main>

    <script>
      const subtitleEl = document.getElementById("page-subtitle");
      const statusEl = document.getElementById("status-bar");
      const resultsEl = document.getElementById("results");
      const summaryEl = document.getElementById("summary");

      const GENERATIONS = {
        "Nintendo Entertainment System": "3eme",
        "Sega Master System": "3eme",
        "Atari Lynx": "3eme",
        "Super Nintendo": "4eme",
        "Sega Genesis": "4eme",
        "Game Gear": "4eme",
        "Neo Geo": "4eme",
        "TurboGrafx-16": "4eme",
        "WonderSwan": "4eme",
        "Nintendo 64": "5eme",
        "Sega Saturn": "5eme",
        "PlayStation": "5eme",
        Dreamcast: "6eme",
        "Game Boy": "Portable",
        "Game Boy Advance": "Portable",
        "Nintendo DS": "Portable",
      };

      const MAKERS = {
        "Nintendo Entertainment System": "Nintendo",
        "Super Nintendo": "Nintendo",
        "Nintendo 64": "Nintendo",
        "Game Boy": "Nintendo",
        "Game Boy Advance": "Nintendo",
        "Nintendo DS": "Nintendo",
        "Sega Genesis": "Sega",
        "Sega Saturn": "Sega",
        Dreamcast: "Sega",
        "Game Gear": "Sega",
        "Sega Master System": "Sega",
        PlayStation: "Sony",
        "Neo Geo": "SNK",
        "TurboGrafx-16": "NEC",
        "Atari Lynx": "Atari",
        WonderSwan: "Bandai",
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      function getGeneration(name) {
        return GENERATIONS[name] || "Portable";
      }

      function getMaker(name) {
        return MAKERS[name] || "Indetermine";
      }

      function gamesUrl(name) {
        const params = new URLSearchParams();
        params.set("console", name);
        params.set("limit", "20");
        return `/games-list.html?${params.toString()}`;
      }

      function consoleCard(item, maxCount) {
        const width = maxCount ? Math.max(10, Math.round((Number(item.gamesCount) / maxCount) * 100)) : 10;

        return `
          <article class="console-card">
            <div class="card-head">
              <div>
                <h3>${escapeHtml(item.name)}</h3>
                <div class="badge-row">
                  <span class="meta-badge">${escapeHtml(getGeneration(item.name))}</span>
                  <span class="meta-badge">${escapeHtml(getMaker(item.name))}</span>
                </div>
              </div>
              <div class="games-count">
                <span class="value">${escapeHtml(item.gamesCount)}</span>
                <span class="label">jeux</span>
              </div>
            </div>
            <div class="maker-line">Fabricant : ${escapeHtml(getMaker(item.name))}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${width}%"></div>
            </div>
            <div class="bar-caption">
              <span>${escapeHtml(item.name)}</span>
              <span>${escapeHtml(item.gamesCount)} / ${escapeHtml(maxCount)}</span>
            </div>
            <div>
              <a href="${gamesUrl(item.name)}" class="btn">Voir les jeux &rarr;</a>
            </div>
          </article>
        `;
      }

      function renderSummary(items) {
        const sorted = [...items].sort((left, right) => Number(right.gamesCount) - Number(left.gamesCount));
        const max = sorted[0];
        const minCount = Number(sorted[sorted.length - 1]?.gamesCount || 0);
        const mins = sorted.filter((item) => Number(item.gamesCount) === minCount).map((item) => item.name);

        summaryEl.innerHTML = `
          <div><strong>Console la plus representee :</strong> ${escapeHtml(max.name)} (${escapeHtml(max.gamesCount)} jeux)</div>
          <div><strong>Console la moins representee :</strong> ${escapeHtml(mins.join(" / "))} (${escapeHtml(minCount)} jeux)</div>
        `;
      }

      async function loadConsoles() {
        try {
          const payload = await fetchJson("/api/consoles");
          const items = payload.items || [];
          const totalGames = items.reduce((sum, item) => sum + Number(item.gamesCount || 0), 0);
          const maxCount = Math.max(...items.map((item) => Number(item.gamesCount || 0)), 1);

          subtitleEl.textContent = `${items.length} systemes retro`;
          statusEl.innerHTML = `<strong>${items.length} consoles</strong> · <strong>${totalGames} jeux</strong> au total`;
          resultsEl.innerHTML = items.map((item) => consoleCard(item, maxCount)).join("");
          renderSummary(items);
        } catch (error) {
          statusEl.textContent = `Erreur consoles - ${error.message}`;
          resultsEl.innerHTML = '<div class="empty-state">Impossible de charger les consoles.</div>';
          summaryEl.innerHTML = "";
        }
      }

      loadConsoles();
    </script>
  </body>
</html>

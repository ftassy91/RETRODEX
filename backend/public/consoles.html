<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex - Consoles</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      .consoles-page {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .consoles-layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 0;
        border: 1px solid var(--border);
        background: var(--bg-surface);
      }

      .consoles-main {
        padding: 16px;
        border-right: 1px solid var(--border);
      }

      .consoles-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .console-card {
        border: 1px solid var(--border);
        background: var(--bg-card);
        padding: 14px;
        cursor: pointer;
        transition: border-color 120ms ease, background 120ms ease;
      }

      .console-card:hover,
      .console-card.active {
        border-color: var(--accent);
        background: rgba(61, 220, 61, 0.06);
      }

      .console-card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
      }

      .console-name {
        color: var(--text-value);
        font-family: var(--font-mono);
        font-size: 1rem;
      }

      .console-year {
        color: var(--text-alert);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .console-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        color: var(--text-secondary);
        font-size: 0.8rem;
      }

      .manufacturer-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border: 1px solid var(--border);
        color: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        text-transform: uppercase;
      }

      .detail-panel {
        padding: 16px;
        background: #0b110b;
        min-height: 520px;
      }

      .detail-empty {
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 0.9rem;
      }

      .detail-title {
        color: var(--text-value);
        font-family: var(--font-mono);
        font-size: 1.15rem;
        margin-bottom: 10px;
      }

      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .detail-pill {
        padding: 3px 8px;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 0.72rem;
      }

      .detail-games {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .detail-games a {
        color: var(--text-primary);
        text-decoration: none;
        font-size: 0.82rem;
      }

      .detail-games a:hover {
        color: var(--accent);
      }

      .detail-games small {
        color: var(--text-secondary);
      }

      .detail-count {
        color: var(--text-secondary);
        font-size: 0.78rem;
        margin-bottom: 12px;
      }

      @media (max-width: 768px) {
        .consoles-layout {
          grid-template-columns: 1fr;
        }

        .consoles-main {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .consoles-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="consoles-page">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <span class="current">CONSOLES</span>
      </nav>

      <h1 class="page-title">CONSOLES</h1>
      <p id="console-count" class="page-subtitle">Chargement...</p>

      <section class="consoles-layout">
        <div class="consoles-main">
          <div id="consoles-grid" class="consoles-grid"></div>
        </div>
        <aside id="console-detail" class="detail-panel">
          <div class="detail-empty">&larr; Selectionner une console</div>
        </aside>
      </section>
    </main>

    <script>
      const countEl = document.getElementById('console-count');
      const gridEl = document.getElementById('consoles-grid');
      const detailEl = document.getElementById('console-detail');
      let selectedId = null;

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function getManufacturer(label) {
        const text = String(label || '').toLowerCase();
        if (text.includes('nintendo') || text.includes('game boy')) return 'Nintendo';
        if (text.includes('sega') || text.includes('dreamcast') || text.includes('saturn') || text.includes('genesis')) return 'Sega';
        if (text.includes('playstation')) return 'Sony';
        if (text.includes('neo geo')) return 'SNK';
        return 'Autre';
      }

      function renderCard(item) {
        const manufacturer = getManufacturer(item.title || item.platform);
        return `
          <article class="console-card${item.id === selectedId ? ' active' : ''}" data-id="${escapeHtml(item.id)}">
            <div class="console-card-head">
              <div class="console-name">${escapeHtml(item.title)}</div>
              <div class="console-year">${escapeHtml(item.year || '—')}</div>
            </div>
            <div class="console-meta">
              <span>${escapeHtml(item.gamesCount || 0)} jeux associes</span>
              <span class="manufacturer-badge">${escapeHtml(manufacturer)}</span>
            </div>
          </article>
        `;
      }

      function renderDetail(payload) {
        const manufacturer = getManufacturer(payload.console.title || payload.console.platform);
        const games = payload.games || [];
        const list = games.length
          ? `
            <ul class="detail-games">
              ${games.map((game) => `
                <li>
                  <a href="/game-detail.html?id=${encodeURIComponent(game.id)}">${escapeHtml(game.title)}</a>
                  <small>${escapeHtml(game.year || '—')}</small>
                </li>
              `).join('')}
            </ul>
          `
          : '<div class="detail-empty">Aucun jeu associe pour le moment.</div>';

        detailEl.innerHTML = `
          <div class="detail-title">${escapeHtml(payload.console.title)}</div>
          <div class="detail-meta">
            <span class="detail-pill">${escapeHtml(payload.console.year || '—')}</span>
            <span class="detail-pill">${escapeHtml(manufacturer)}</span>
            <span class="detail-pill">${escapeHtml(payload.console.platform)}</span>
          </div>
          <div class="detail-count">${games.length} jeux affiches</div>
          ${list}
        `;
      }

      async function loadDetail(id) {
        selectedId = id;
        detailEl.innerHTML = '<div class="detail-empty">Chargement...</div>';
        const response = await fetch(`/api/consoles/${encodeURIComponent(id)}`);
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          detailEl.innerHTML = '<div class="detail-empty">Console introuvable.</div>';
          return;
        }
        renderDetail(payload);
      }

      async function loadConsoles() {
        const response = await fetch('/api/consoles');
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          countEl.textContent = 'Impossible de charger les consoles';
          gridEl.innerHTML = '';
          detailEl.innerHTML = '<div class="detail-empty">Erreur de chargement.</div>';
          return;
        }

        const consoles = payload.consoles || [];
        countEl.textContent = `${payload.count || consoles.length} systemes retro`;
        gridEl.innerHTML = consoles.map(renderCard).join('');

        gridEl.querySelectorAll('.console-card').forEach((card) => {
          card.addEventListener('click', async () => {
            selectedId = card.dataset.id;
            gridEl.querySelectorAll('.console-card').forEach((node) => node.classList.toggle('active', node.dataset.id === selectedId));
            await loadDetail(selectedId);
          });
        });

        if (consoles.length > 0) {
          selectedId = consoles[0].id;
          gridEl.querySelector(`.console-card[data-id="${CSS.escape(selectedId)}"]`)?.classList.add('active');
          await loadDetail(selectedId);
        }
      }

      loadConsoles().catch(() => {
        countEl.textContent = 'Impossible de charger les consoles';
        detailEl.innerHTML = '<div class="detail-empty">Erreur de chargement.</div>';
      });
    </script>
  </body>
</html>

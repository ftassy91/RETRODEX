<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex Consoles</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081008;
        --panel: #102010;
        --line: #294229;
        --text: #d7efd7;
        --muted: #98b898;
        --accent: #8bac0f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Consolas, "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0 0 12px;
      }

      .panel {
        margin-bottom: 16px;
        padding: 16px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .status {
        color: var(--accent);
        min-height: 20px;
      }

      .muted {
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .console-card {
        border: 1px solid var(--line);
        background: #0b160b;
        padding: 12px;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: #183018;
        color: var(--text);
        text-decoration: none;
        min-width: 170px;
      }

      .button-link:hover {
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>RetroDex Consoles</h1>
        <p class="muted">
          Page beginner isolee pour consommer <code>GET /api/consoles</code> sans remplacer le
          prototype statique principal.
        </p>
        <div class="actions">
          <a class="button-link" href="/home.html">Retour a Home backend</a>
          <a class="button-link" href="/games-list.html">Ouvrir GamesList</a>
          <a class="button-link" href="/debug.html">Ouvrir debug riche</a>
        </div>
        <div id="status" class="status">Chargement des consoles...</div>
      </section>

      <section class="panel">
        <h2>Consoles</h2>
        <div id="results" class="grid"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function fetchJson(url) {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        return response.json();
      }

      function buildGamesListUrl(consoleName) {
        const params = new URLSearchParams();
        params.set("console", consoleName);
        params.set("limit", "20");
        return `/games-list.html?${params.toString()}`;
      }

      function consoleCard(item) {
        return `
          <article class="console-card">
            <h3>${escapeHtml(item.name)}</h3>
            <div class="meta">
              <div><span class="muted">Jeux</span><br>${escapeHtml(item.gamesCount)}</div>
              <div><span class="muted">API</span><br>/api/consoles</div>
            </div>
            <div class="actions">
              <a class="button-link" href="${buildGamesListUrl(item.name)}">Voir les jeux</a>
            </div>
          </article>
        `;
      }

      async function loadConsoles() {
        try {
          const payload = await fetchJson("/api/consoles");
          statusEl.textContent = `${payload.items.length} console(s) chargee(s).`;
          resultsEl.innerHTML = payload.items.map(consoleCard).join("");
        } catch (error) {
          statusEl.textContent = `Erreur consoles - ${error.message}`;
          resultsEl.innerHTML = '<div class="muted">Impossible de charger les consoles.</div>';
        }
      }

      loadConsoles();
    </script>
  </body>
</html>

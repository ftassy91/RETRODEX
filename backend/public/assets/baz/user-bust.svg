<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <style>
    .user-idle { display: block; }
    .user-listen { display: none; }
  </style>

  <rect width="64" height="64" fill="#000000"/>

  <!-- user-idle state -->
  <g class="user-idle">
    <!-- Headband arc (visible curved band over the top) -->
    <rect x="22" y="2" width="20" height="2" fill="#00FF41"/>
    <rect x="18" y="4" width="4" height="2" fill="#00FF41"/>
    <rect x="42" y="4" width="4" height="2" fill="#00FF41"/>
    <rect x="16" y="6" width="2" height="2" fill="#00FF41"/>
    <rect x="46" y="6" width="2" height="2" fill="#00FF41"/>
    <rect x="14" y="8" width="2" height="4" fill="#00FF41"/>
    <rect x="48" y="8" width="2" height="4" fill="#00FF41"/>

    <!-- Left headphone pad (thicker, more recognizable) -->
    <rect x="10" y="10" width="4" height="10" fill="#00FF41"/>
    <rect x="8" y="12" width="2" height="6" fill="#00FF41"/>
    <!-- Right headphone pad -->
    <rect x="50" y="10" width="4" height="10" fill="#00FF41"/>
    <rect x="54" y="12" width="2" height="6" fill="#00FF41"/>

    <!-- Head - organic shape (slightly wider at jaw, narrower at crown) -->
    <rect x="22" y="8" width="20" height="2" fill="#00FF41"/>
    <rect x="18" y="10" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="12" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="14" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="16" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="18" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="20" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="22" width="32" height="2" fill="#00FF41"/>
    <rect x="18" y="24" width="28" height="2" fill="#00FF41"/>
    <rect x="20" y="26" width="24" height="2" fill="#00FF41"/>
    <rect x="22" y="28" width="20" height="2" fill="#00FF41"/>
    <rect x="24" y="30" width="16" height="2" fill="#00FF41"/>
    <!-- Chin taper -->
    <rect x="26" y="32" width="12" height="2" fill="#00FF41"/>

    <!-- Neck -->
    <rect x="28" y="34" width="8" height="2" fill="#00FF41"/>
    <rect x="26" y="36" width="12" height="2" fill="#00FF41"/>
    <rect x="24" y="38" width="16" height="2" fill="#00FF41"/>

    <!-- Shoulders with darker outline edges -->
    <rect x="20" y="40" width="24" height="2" fill="#00FF41"/>
    <rect x="16" y="42" width="32" height="2" fill="#00FF41"/>
    <rect x="12" y="44" width="40" height="2" fill="#00FF41"/>
    <rect x="8" y="46" width="48" height="2" fill="#00FF41"/>
    <rect x="4" y="48" width="56" height="2" fill="#00FF41"/>
    <rect x="2" y="50" width="60" height="2" fill="#00FF41"/>
    <rect x="0" y="52" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="54" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="56" width="64" height="12" fill="#00FF41"/>

    <!-- Shoulder contour outlines (2px dark edge on outer slopes) -->
    <rect x="20" y="40" width="2" height="2" fill="#004D1A"/>
    <rect x="42" y="40" width="2" height="2" fill="#004D1A"/>
    <rect x="16" y="42" width="2" height="2" fill="#004D1A"/>
    <rect x="46" y="42" width="2" height="2" fill="#004D1A"/>
    <rect x="12" y="44" width="2" height="2" fill="#004D1A"/>
    <rect x="50" y="44" width="2" height="2" fill="#004D1A"/>
    <rect x="8" y="46" width="2" height="2" fill="#004D1A"/>
    <rect x="54" y="46" width="2" height="2" fill="#004D1A"/>
    <rect x="4" y="48" width="2" height="2" fill="#004D1A"/>
    <rect x="58" y="48" width="2" height="2" fill="#004D1A"/>
    <rect x="2" y="50" width="2" height="2" fill="#004D1A"/>
    <rect x="60" y="50" width="2" height="2" fill="#004D1A"/>
  </g>

  <!-- user-listen state (nod: head shifts down 2px, shoulders stay) -->
  <g class="user-listen">
    <!-- Headband arc (shifted down 2px) -->
    <rect x="22" y="4" width="20" height="2" fill="#00FF41"/>
    <rect x="18" y="6" width="4" height="2" fill="#00FF41"/>
    <rect x="42" y="6" width="4" height="2" fill="#00FF41"/>
    <rect x="16" y="8" width="2" height="2" fill="#00FF41"/>
    <rect x="46" y="8" width="2" height="2" fill="#00FF41"/>
    <rect x="14" y="10" width="2" height="4" fill="#00FF41"/>
    <rect x="48" y="10" width="2" height="4" fill="#00FF41"/>

    <!-- Left headphone pad (shifted down 2px) -->
    <rect x="10" y="12" width="4" height="10" fill="#00FF41"/>
    <rect x="8" y="14" width="2" height="6" fill="#00FF41"/>
    <!-- Right headphone pad -->
    <rect x="50" y="12" width="4" height="10" fill="#00FF41"/>
    <rect x="54" y="14" width="2" height="6" fill="#00FF41"/>

    <!-- Head - organic shape (shifted down 2px) -->
    <rect x="22" y="10" width="20" height="2" fill="#00FF41"/>
    <rect x="18" y="12" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="14" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="16" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="18" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="20" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="22" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="24" width="32" height="2" fill="#00FF41"/>
    <rect x="18" y="26" width="28" height="2" fill="#00FF41"/>
    <rect x="20" y="28" width="24" height="2" fill="#00FF41"/>
    <rect x="22" y="30" width="20" height="2" fill="#00FF41"/>
    <rect x="24" y="32" width="16" height="2" fill="#00FF41"/>
    <!-- Chin taper -->
    <rect x="26" y="34" width="12" height="2" fill="#00FF41"/>

    <!-- Neck (shifted down 2px, compressed to meet shoulders) -->
    <rect x="28" y="36" width="8" height="2" fill="#00FF41"/>
    <rect x="26" y="38" width="12" height="2" fill="#00FF41"/>

    <!-- Shoulders (same position as idle - body stays, head nods) -->
    <rect x="20" y="40" width="24" height="2" fill="#00FF41"/>
    <rect x="16" y="42" width="32" height="2" fill="#00FF41"/>
    <rect x="12" y="44" width="40" height="2" fill="#00FF41"/>
    <rect x="8" y="46" width="48" height="2" fill="#00FF41"/>
    <rect x="4" y="48" width="56" height="2" fill="#00FF41"/>
    <rect x="2" y="50" width="60" height="2" fill="#00FF41"/>
    <rect x="0" y="52" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="54" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="56" width="64" height="12" fill="#00FF41"/>

    <!-- Shoulder contour outlines (same as idle) -->
    <rect x="20" y="40" width="2" height="2" fill="#004D1A"/>
    <rect x="42" y="40" width="2" height="2" fill="#004D1A"/>
    <rect x="16" y="42" width="2" height="2" fill="#004D1A"/>
    <rect x="46" y="42" width="2" height="2" fill="#004D1A"/>
    <rect x="12" y="44" width="2" height="2" fill="#004D1A"/>
    <rect x="50" y="44" width="2" height="2" fill="#004D1A"/>
    <rect x="8" y="46" width="2" height="2" fill="#004D1A"/>
    <rect x="54" y="46" width="2" height="2" fill="#004D1A"/>
    <rect x="4" y="48" width="2" height="2" fill="#004D1A"/>
    <rect x="58" y="48" width="2" height="2" fill="#004D1A"/>
    <rect x="2" y="50" width="2" height="2" fill="#004D1A"/>
    <rect x="60" y="50" width="2" height="2" fill="#004D1A"/>
  </g>
</svg>
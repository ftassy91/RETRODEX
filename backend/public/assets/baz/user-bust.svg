<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <style>
    .user-idle { transform: translateY(0); }
    .user-listen { transform: translateY(-1px); }
  </style>

  <rect width="64" height="64" fill="#000000"/>

  <!-- user-idle state -->
  <g class="user-idle">
    <!-- Left headphone pad -->
    <rect x="14" y="10" width="4" height="8" fill="#00FF41"/>
    <rect x="12" y="12" width="2" height="4" fill="#00FF41"/>
    <!-- Right headphone pad -->
    <rect x="46" y="10" width="4" height="8" fill="#00FF41"/>
    <rect x="50" y="12" width="2" height="4" fill="#00FF41"/>
    <!-- Headband top -->
    <rect x="18" y="6" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="8" width="2" height="4" fill="#00FF41"/>
    <rect x="46" y="8" width="2" height="4" fill="#00FF41"/>

    <!-- Head - round shape -->
    <rect x="20" y="8" width="24" height="2" fill="#00FF41"/>
    <rect x="18" y="10" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="12" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="14" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="16" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="18" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="20" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="22" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="24" width="32" height="2" fill="#00FF41"/>
    <rect x="18" y="26" width="28" height="2" fill="#00FF41"/>
    <rect x="18" y="28" width="28" height="2" fill="#00FF41"/>
    <rect x="20" y="30" width="24" height="2" fill="#00FF41"/>
    <rect x="22" y="32" width="20" height="2" fill="#00FF41"/>

    <!-- Neck -->
    <rect x="26" y="34" width="12" height="2" fill="#00FF41"/>
    <rect x="26" y="36" width="12" height="2" fill="#00FF41"/>
    <rect x="24" y="38" width="16" height="2" fill="#00FF41"/>

    <!-- Shoulders -->
    <rect x="20" y="40" width="24" height="2" fill="#00FF41"/>
    <rect x="16" y="42" width="32" height="2" fill="#00FF41"/>
    <rect x="12" y="44" width="40" height="2" fill="#00FF41"/>
    <rect x="8" y="46" width="48" height="2" fill="#00FF41"/>
    <rect x="4" y="48" width="56" height="2" fill="#00FF41"/>
    <rect x="2" y="50" width="60" height="2" fill="#00FF41"/>
    <rect x="0" y="52" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="54" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="56" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="58" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="60" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="62" width="64" height="2" fill="#00FF41"/>
  </g>

  <!-- user-listen state (hidden by default, toggle via JS) -->
  <g class="user-listen" style="display:none;">
    <!-- Left headphone pad -->
    <rect x="14" y="9" width="4" height="8" fill="#00FF41"/>
    <rect x="12" y="11" width="2" height="4" fill="#00FF41"/>
    <!-- Right headphone pad -->
    <rect x="46" y="9" width="4" height="8" fill="#00FF41"/>
    <rect x="50" y="11" width="2" height="4" fill="#00FF41"/>
    <!-- Headband top -->
    <rect x="18" y="5" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="7" width="2" height="4" fill="#00FF41"/>
    <rect x="46" y="7" width="2" height="4" fill="#00FF41"/>

    <!-- Head - shifted 1px up -->
    <rect x="20" y="7" width="24" height="2" fill="#00FF41"/>
    <rect x="18" y="9" width="28" height="2" fill="#00FF41"/>
    <rect x="16" y="11" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="13" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="15" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="17" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="19" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="21" width="32" height="2" fill="#00FF41"/>
    <rect x="16" y="23" width="32" height="2" fill="#00FF41"/>
    <rect x="18" y="25" width="28" height="2" fill="#00FF41"/>
    <rect x="18" y="27" width="28" height="2" fill="#00FF41"/>
    <rect x="20" y="29" width="24" height="2" fill="#00FF41"/>
    <rect x="22" y="31" width="20" height="2" fill="#00FF41"/>

    <!-- Neck -->
    <rect x="26" y="33" width="12" height="2" fill="#00FF41"/>
    <rect x="26" y="35" width="12" height="2" fill="#00FF41"/>
    <rect x="24" y="37" width="16" height="2" fill="#00FF41"/>

    <!-- Shoulders (same position - body stays, head nods) -->
    <rect x="20" y="40" width="24" height="2" fill="#00FF41"/>
    <rect x="16" y="42" width="32" height="2" fill="#00FF41"/>
    <rect x="12" y="44" width="40" height="2" fill="#00FF41"/>
    <rect x="8" y="46" width="48" height="2" fill="#00FF41"/>
    <rect x="4" y="48" width="56" height="2" fill="#00FF41"/>
    <rect x="2" y="50" width="60" height="2" fill="#00FF41"/>
    <rect x="0" y="52" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="54" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="56" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="58" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="60" width="64" height="2" fill="#00FF41"/>
    <rect x="0" y="62" width="64" height="2" fill="#00FF41"/>
  </g>
</svg>

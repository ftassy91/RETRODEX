<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<style>
  /* === STATE VISIBILITY === */
  .baz-idle { visibility: visible; }
  .baz-talk { visibility: hidden; }
  .baz-content { visibility: hidden; }

  /* === IRREGULAR BLINK === */
  @keyframes blink32 {
    0%    { opacity: 1; }
    88%   { opacity: 1; }
    89%   { opacity: 0; }
    93%   { opacity: 0; }
    94%   { opacity: 1; }
    100%  { opacity: 1; }
  }
  @keyframes blink32b {
    0%    { opacity: 1; }
    42%   { opacity: 1; }
    43%   { opacity: 0; }
    46%   { opacity: 0; }
    47%   { opacity: 1; }
    93%   { opacity: 1; }
    94%   { opacity: 0; }
    97%   { opacity: 0; }
    98%   { opacity: 1; }
    100%  { opacity: 1; }
  }
  .blink-l { animation: blink32 3.7s steps(1) infinite; }
  .blink-r { animation: blink32b 4.1s steps(1) infinite; }

  /* === CONTENT FLASH === */
  @keyframes cflash32 {
    0%   { opacity: 0.5; }
    10%  { opacity: 0.5; }
    11%  { opacity: 0; }
    100% { opacity: 0; }
  }
  .content-flash { animation: cflash32 1.5s steps(1) 1; }
</style>

<!-- ==================== -->
<!-- CASING TOP (2px)     -->
<!-- ==================== -->
<rect x="0" y="0" width="32" height="2" fill="#003318"/>
<rect x="1" y="0" width="30" height="1" fill="#005C2D"/>

<!-- ==================== -->
<!-- SCREEN BEZEL         -->
<!-- ==================== -->
<rect x="1" y="2" width="30" height="1" fill="#005C2D"/>
<rect x="1" y="2" width="1" height="24" fill="#005C2D"/>
<rect x="30" y="2" width="1" height="24" fill="#005C2D"/>
<rect x="1" y="25" width="30" height="1" fill="#005C2D"/>

<!-- ==================== -->
<!-- SCREEN BLACK         -->
<!-- ==================== -->
<rect x="2" y="3" width="28" height="22" fill="#000000"/>


<!-- ================================ -->
<!-- === IDLE STATE ================= -->
<!-- ================================ -->
<g class="baz-idle">

  <!-- LEFT EYE 3x3 outline at (8,8) -->
  <rect x="8" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="10" y="8" width="1" height="3" fill="#00B858"/>
  <!-- interior -->
  <rect x="9" y="9" width="1" height="1" fill="#000000"/>
  <!-- pupil 1x1 (blinks) -->
  <g class="blink-l">
    <rect x="9" y="9" width="1" height="1" fill="#00E56D"/>
  </g>

  <!-- RIGHT EYE 3x3 outline at (21,8) -->
  <rect x="21" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="23" y="8" width="1" height="3" fill="#00B858"/>
  <!-- interior -->
  <rect x="22" y="9" width="1" height="1" fill="#000000"/>
  <!-- pupil 1x1 (blinks) -->
  <g class="blink-r">
    <rect x="22" y="9" width="1" height="1" fill="#00E56D"/>
  </g>

  <!-- MOUTH: flat line 4px -->
  <rect x="14" y="15" width="4" height="1" fill="#008542"/>
</g>


<!-- ================================ -->
<!-- === TALK STATE ================= -->
<!-- ================================ -->
<g class="baz-talk">

  <!-- LEFT EYE (pupil shifted 1px right) -->
  <rect x="8" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="10" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="9" y="9" width="1" height="1" fill="#000000"/>
  <rect x="10" y="9" width="1" height="1" fill="#00E56D"/>

  <!-- RIGHT EYE (pupil shifted 1px right) -->
  <rect x="21" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="23" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="22" y="9" width="1" height="1" fill="#000000"/>
  <rect x="23" y="9" width="1" height="1" fill="#00E56D"/>

  <!-- MOUTH: 2 small bars (speaking) -->
  <rect x="14" y="14" width="1" height="2" fill="#00B858"/>
  <rect x="17" y="13" width="1" height="3" fill="#00B858"/>
</g>


<!-- ================================ -->
<!-- === CONTENT STATE ============== -->
<!-- ================================ -->
<g class="baz-content">

  <!-- flash overlay -->
  <rect x="2" y="3" width="28" height="22" fill="#00E56D" opacity="0" class="content-flash"/>

  <!-- LEFT EYE (pupil stays 1x1 centered) -->
  <rect x="8" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="8" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="10" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="9" y="9" width="1" height="1" fill="#00E56D"/>

  <!-- RIGHT EYE -->
  <rect x="21" y="8" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="10" width="3" height="1" fill="#00B858"/>
  <rect x="21" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="23" y="8" width="1" height="3" fill="#00B858"/>
  <rect x="22" y="9" width="1" height="1" fill="#00E56D"/>

  <!-- MOUTH: upward curve (satisfied) -->
  <rect x="13" y="16" width="1" height="1" fill="#00E56D"/>
  <rect x="14" y="15" width="4" height="1" fill="#00E56D"/>
  <rect x="18" y="16" width="1" height="1" fill="#00E56D"/>
</g>


<!-- ==================== -->
<!-- CASING BOTTOM (6px)  -->
<!-- ==================== -->
<rect x="0" y="26" width="32" height="6" fill="#003318"/>
<rect x="1" y="26" width="30" height="1" fill="#005C2D"/>
<!-- keyboard hint: 2 keys -->
<rect x="9" y="28" width="6" height="2" fill="#001A0C"/>
<rect x="10" y="28" width="4" height="1" fill="#005C2D"/>
<rect x="17" y="28" width="6" height="2" fill="#001A0C"/>
<rect x="18" y="28" width="4" height="1" fill="#005C2D"/>
<!-- LED -->
<rect x="28" y="29" width="1" height="1" fill="#008542"/>

</svg>
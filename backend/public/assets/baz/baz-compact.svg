<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
<style>
  /* === STATE VISIBILITY === */
  .baz-idle { visibility: visible; }
  .baz-talk { visibility: hidden; }

  /* === IRREGULAR BLINK === */
  @keyframes blinkCompact {
    0%    { opacity: 1; }
    88%   { opacity: 1; }
    88.5% { opacity: 0; }
    92%   { opacity: 0; }
    92.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  @keyframes blinkCompact2 {
    0%    { opacity: 1; }
    44%   { opacity: 1; }
    44.5% { opacity: 0; }
    47%   { opacity: 0; }
    47.5% { opacity: 1; }
    93%   { opacity: 1; }
    93.5% { opacity: 0; }
    96%   { opacity: 0; }
    96.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  .blink-l { animation: blinkCompact  3.7s steps(1) infinite; }
  .blink-r { animation: blinkCompact2 4.1s steps(1) infinite; }

  /* === ANTENNA PULSE === */
  @keyframes antennaPulseSmall {
    0%    { opacity: 1; }
    39.1% { opacity: 1; }
    39.5% { opacity: 0.3; }
    46.5% { opacity: 0.3; }
    47%   { opacity: 1; }
    99.2% { opacity: 1; }
    99.5% { opacity: 0.3; }
    100%  { opacity: 0.3; }
  }
  .antenna-glow-sm {
    animation: antennaPulseSmall 2.26s steps(1) infinite;
  }
</style>

<!-- =============================== -->
<!-- === IDLE STATE ================= -->
<!-- =============================== -->
<g class="baz-idle">

  <!-- ANTENNA: stalk 1px wide, 3px tall -->
  <rect x="8" y="1" width="1" height="1" fill="#0F380F"/>
  <rect x="8" y="2" width="1" height="1" fill="#0F380F"/>
  <!-- antenna glow tip -->
  <rect x="8" y="0" width="1" height="1" fill="#E0F8D0" class="antenna-glow-sm"/>

  <!-- BODY: round blob 10x10 area, centered ~x=3..13, y=3..12 -->
  <!-- Top row of body -->
  <rect x="5" y="3" width="1" height="1" fill="#0F380F"/>
  <rect x="6" y="3" width="1" height="1" fill="#0F380F"/>

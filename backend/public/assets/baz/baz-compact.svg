<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
<style>
  /* === STATE VISIBILITY === */
  .baz-idle { visibility: visible; }
  .baz-talk { visibility: hidden; }

  /* === IRREGULAR EYE BLINK === */
  @keyframes blinkCompact {
    0%    { opacity: 1; }
    86%   { opacity: 1; }
    86.5% { opacity: 0; }
    90%   { opacity: 0; }
    90.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  @keyframes blinkCompact2 {
    0%    { opacity: 1; }
    42%   { opacity: 1; }
    42.5% { opacity: 0; }
    45%   { opacity: 0; }
    45.5% { opacity: 1; }
    91%   { opacity: 1; }
    91.5% { opacity: 0; }
    94%   { opacity: 0; }
    94.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  .blink-l { animation: blinkCompact  3.7s steps(1) infinite; }
  .blink-r { animation: blinkCompact2 4.1s steps(1) infinite; }

  /* === ANTENNA PULSE (irregular) === */
  @keyframes antennaPulseSmall {
    0%    { opacity: 1; }
    39.1% { opacity: 1; }
    39.5% { opacity: 0.2; }
    46.5% { opacity: 0.2; }
    47%   { opacity: 1; }
    82%   { opacity: 1; }
    82.5% { opacity: 0.2; }
    85%   { opacity: 0.2; }
    85.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  .antenna-glow-sm {
    animation: antennaPulseSmall 2.26s steps(1) infinite;
  }
</style>

<!-- =============================== -->
<!-- === IDLE STATE ================= -->
<!-- =============================== -->
<g class="baz-idle">

  <!-- ANTENNA: sparkle tip (cross shape) -->
  <g class="antenna-glow-sm">
    <rect x="7" y="0" width="1" height="1" fill="#E0F8D0"/>
    <rect x="8" y="0" width="1" height="1" fill="#E0F8D0"/>
    <rect x="9" y="0" width="1" height="1" fill="#E0F8D0"/>
    <rect x="8" y="1" width="1" height="1" fill="#E0F8D0"/>
  </g>
  <!-- ANTENNA: stalk -->
  <rect x="8" y="1" width="1" height="1" fill="#306230"/>
  <rect x="8" y="2" width="1" height="1" fill="#0F380F"/>
  <rect x="8" y="3" width="1" height="1" fill="#0F380F"/>

  <!-- BODY: round blob -->

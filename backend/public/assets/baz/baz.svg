<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <style>
    /* Default: idle visible, talk and content hidden */
    .baz-idle { display: block; }
    .baz-talk { display: none; }
    .baz-content { display: none; }

    /* Blinking cursor animation */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <defs>
    <!-- Shared terminal body -->
    <g id="terminal-body">
      <!-- Terminal outer shell -->
      <rect x="4" y="4" width="56" height="48" rx="3" ry="3" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <!-- Screen bezel -->
      <rect x="8" y="8" width="48" height="36" rx="1" ry="1" fill="#000000" stroke="#00FF41" stroke-width="1"/>
      <!-- Screen inner glow border (1px lighter inside screen) -->
      <rect x="9" y="9" width="46" height="34" fill="none" stroke="#004D1A" stroke-width="1"/>

      <!-- Ventilation grills on left side -->
      <rect x="6" y="46" width="4" height="1" fill="#00FF41"/>
      <rect x="6" y="48" width="4" height="1" fill="#00FF41"/>
      <rect x="6" y="50" width="3" height="1" fill="#00FF41"/>
      <!-- Ventilation grills on right side -->
      <rect x="54" y="46" width="4" height="1" fill="#00FF41"/>
      <rect x="54" y="48" width="4" height="1" fill="#00FF41"/>
      <rect x="55" y="50" width="3" height="1" fill="#00FF41"/>

      <!-- Brand logo: "B" pixel mark on bezel -->
      <rect x="51" y="46" width="1" height="3" fill="#00FF41"/>
      <rect x="52" y="46" width="1" height="1" fill="#00FF41"/>
      <rect x="52" y="48" width="1" height="1" fill="#00FF41"/>
      <rect x="53" y="47" width="1" height="1" fill="#00FF41"/>

      <!-- Power LED -->
      <rect x="29" y="54" width="6" height="2" rx="1" ry="1" fill="#00FF41"/>
      <!-- Power button housing -->
      <rect x="28" y="53" width="8" height="4" rx="1" ry="1" fill="none" stroke="#00FF41" stroke-width="1"/>
      <!-- Feet -->
      <rect x="8" y="52" width="6" height="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <rect x="50" y="52" width="6" height="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>

      <!-- Keyboard shelf -->
      <rect x="10" y="56" width="44" height="6" rx="2" ry="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <!-- Keyboard keys row 1 (varied sizes for more realism) -->
      <rect x="12" y="57" width="2" height="2" fill="#00FF41"/>
      <rect x="15" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="19" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="23" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="27" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="31" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="35" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="39" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="43" y="57" width="2" height="2" fill="#00FF41"/>
      <rect x="46" y="57" width="4" height="2" fill="#00FF41"/>
      <!-- Keyboard keys row 2 (with spacebar and modifiers) -->
      <rect x="12" y="60" width="4" height="1" fill="#00FF41"/>
      <rect x="17" y="60" width="2" height="1" fill="#00FF41"/>
      <rect x="20" y="60" width="16" height="1" fill="#00FF41"/>
      <rect x="37" y="60" width="2" height="1" fill="#00FF41"/>
      <rect x="40" y="60" width="4" height="1" fill="#00FF41"/>
      <rect x="45" y="60" width="5" height="1" fill="#00FF41"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#000000"/>

  <!-- STATE: IDLE -->
  <g class="baz-idle">
    <use href="#terminal-body"/>
    <!-- Screen content: command prompt lines -->
    <rect x="11" y="12" width="2" height="2" fill="#00FF41"/>
    <rect x="14" y="12" width="10" height="2" fill="#00FF41"/>
    <rect x="11" y="16" width="2" height="2" fill="#00FF41"/>
    <rect x="14" y="16" width="18" height="2" fill="#00FF41"/>
    <rect x="11" y="20" width="2" height="2" fill="#00FF41"/>
    <rect x="14" y="20" width="6" height="2" fill="#00FF41"/>
    <!-- Blinking cursor -->
    <rect class="cursor" x="11" y="26" width="4" height="6" fill="#00FF41"/>
  </g>

  <!-- STATE: TALK -->
  <g class="baz-talk">
    <use href="#terminal-body"/>
    <!-- Audio waveform / equalizer bars (varied widths and heights) -->
    <rect x="13" y="30" width="3" height="8" fill="#00FF41"/>
    <rect x="18" y="22" width="5" height="16" fill="#00FF41"/>
    <rect x="25" y="26" width="3" height="12" fill="#00FF41"/>
    <rect x="30" y="16" width="5" height="22" fill="#00FF41"/>
    <rect x="37" y="20" width="3" height="18" fill="#00FF41"/>
    <rect x="42" y="28" width="5" height="10" fill="#00FF41"/>
    <rect x="49" y="24" width="3" height="14" fill="#00FF41"/>
  </g>

  <!-- STATE: CONTENT -->
  <g class="baz-content">
    <use href="#terminal-body"/>
    <!-- Bold checkmark (thicker 2px strokes) -->
    <rect x="14" y="28" width="4" height="4" fill="#00FF41"/>
    <rect x="16" y="30" width="4" height="4" fill="#00FF41"/>
    <rect x="18" y="32" width="4" height="4" fill="#00FF41"/>
    <rect x="20" y="30" width="4" height="4" fill="#00FF41"/>
    <rect x="22" y="28" width="4" height="4" fill="#00FF41"/>
    <rect x="24" y="26" width="4" height="4" fill="#00FF41"/>
    <rect x="26" y="24" width="4" height="4" fill="#00FF41"/>
    <rect x="28" y="22" width="4" height="4" fill="#00FF41"/>
    <rect x="30" y="20" width="4" height="4" fill="#00FF41"/>
    <rect x="32" y="18" width="4" height="4" fill="#00FF41"/>
    <rect x="34" y="16" width="4" height="4" fill="#00FF41"/>
    <rect x="36" y="14" width="4" height="4" fill="#00FF41"/>
    <!-- Second stroke layer for boldness -->
    <rect x="15" y="29" width="4" height="4" fill="#00FF41"/>
    <rect x="17" y="31" width="4" height="4" fill="#00FF41"/>
    <rect x="21" y="29" width="4" height="4" fill="#00FF41"/>
    <rect x="23" y="27" width="4" height="4" fill="#00FF41"/>
    <rect x="25" y="25" width="4" height="4" fill="#00FF41"/>
    <rect x="27" y="23" width="4" height="4" fill="#00FF41"/>
    <rect x="29" y="21" width="4" height="4" fill="#00FF41"/>
    <rect x="31" y="19" width="4" height="4" fill="#00FF41"/>
    <rect x="33" y="17" width="4" height="4" fill="#00FF41"/>
    <rect x="35" y="15" width="4" height="4" fill="#00FF41"/>
  </g>
</svg>
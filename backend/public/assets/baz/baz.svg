<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <style>
    /* Default: idle visible, talk and content hidden */
    .baz-idle { display: block; }
    .baz-talk { display: none; }
    .baz-content { display: none; }

    /* Blinking cursor animation */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <defs>
    <!-- Shared terminal body -->
    <g id="terminal-body">
      <!-- Terminal outer shell -->
      <rect x="4" y="4" width="56" height="48" rx="3" ry="3" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <!-- Screen bezel -->
      <rect x="8" y="8" width="48" height="36" rx="1" ry="1" fill="#000000" stroke="#00FF41" stroke-width="1"/>
      <!-- Ventilation slots on left side of body -->
      <rect x="6" y="46" width="4" height="1" fill="#00FF41"/>
      <rect x="6" y="48" width="4" height="1" fill="#00FF41"/>
      <!-- Power LED -->
      <rect x="29" y="54" width="6" height="2" rx="1" ry="1" fill="#00FF41"/>
      <!-- Power button housing -->
      <rect x="28" y="53" width="8" height="4" rx="1" ry="1" fill="none" stroke="#00FF41" stroke-width="1"/>
      <!-- Feet -->
      <rect x="8" y="52" width="6" height="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <rect x="50" y="52" width="6" height="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <!-- Keyboard shelf -->
      <rect x="10" y="56" width="44" height="6" rx="2" ry="2" fill="#004D1A" stroke="#00FF41" stroke-width="1"/>
      <!-- Keyboard keys row 1 -->
      <rect x="13" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="17" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="21" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="25" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="29" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="33" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="37" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="41" y="57" width="3" height="2" fill="#00FF41"/>
      <rect x="45" y="57" width="3" height="2" fill="#00FF41"/>
      <!-- Keyboard keys row 2 -->
      <rect x="14" y="60" width="3" height="1" fill="#00FF41"/>
      <rect x="18" y="60" width="3" height="1" fill="#00FF41"/>
      <rect x="22" y="60" width="14" height="1" fill="#00FF41"/>
      <rect x="37" y="60" width="3" height="1" fill="#00FF41"/>
      <rect x="41" y="60" width="3" height="1" fill="#00FF41"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#000000"/>

  <!-- STATE: IDLE -->
  <g class="baz-idle">
    <use href="#terminal-body"/>
    <!-- Screen content: command prompt text -->
    <rect x="11" y="11" width="12" height="2" fill="#00FF41"/>
    <rect x="11" y="15" width="20" height="2" fill="#00FF41"/>
    <rect x="11" y="19" width="8" height="2" fill="#00FF41"/>
    <!-- Blinking cursor -->
    <rect class="cursor" x="11" y="30" width="4" height="8" fill="#00FF41"/>
  </g>

  <!-- STATE: TALK -->
  <g class="baz-talk">
    <use href="#terminal-body"/>
    <!-- Audio waveform / equalizer bars -->
    <rect x="16" y="28" width="4" height="12" fill="#00FF41"/>
    <rect x="22" y="18" width="4" height="22" fill="#00FF41"/>
    <rect x="28" y="22" width="4" height="18" fill="#00FF41"/>
    <rect x="34" y="14" width="4" height="26" fill="#00FF41"/>
    <rect x="40" y="24" width="4" height="16" fill="#00FF41"/>
  </g>

  <!-- STATE: CONTENT -->
  <g class="baz-content">
    <use href="#terminal-body"/>
    <!-- Checkmark / tick -->
    <rect x="16" y="28" width="4" height="4" fill="#00FF41"/>
    <rect x="20" y="32" width="4" height="4" fill="#00FF41"/>
    <rect x="24" y="28" width="4" height="4" fill="#00FF41"/>
    <rect x="28" y="24" width="4" height="4" fill="#00FF41"/>
    <rect x="32" y="20" width="4" height="4" fill="#00FF41"/>
    <rect x="36" y="16" width="4" height="4" fill="#00FF41"/>
    <rect x="40" y="12" width="4" height="4" fill="#00FF41"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
<style>
  /* === STATE VISIBILITY === */
  .baz-idle { visibility: visible; }
  .baz-talk { visibility: hidden; }
  .baz-content { visibility: hidden; }

  /* === IRREGULAR BLINK (organic rhythm) === */
  @keyframes blink {
    0%    { opacity: 1; }
    89%   { opacity: 1; }
    89.5% { opacity: 0; }
    93%   { opacity: 0; }
    93.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  @keyframes blink2 {
    0%    { opacity: 1; }
    45%   { opacity: 1; }
    45.5% { opacity: 0; }
    48%   { opacity: 0; }
    48.5% { opacity: 1; }
    94%   { opacity: 1; }
    94.5% { opacity: 0; }
    97%   { opacity: 0; }
    97.5% { opacity: 1; }
    100%  { opacity: 1; }
  }
  .blink-left {
    animation: blink 3.7s steps(1) infinite;
  }
  .blink-right {
    animation: blink2 4.1s steps(1) infinite;
  }

  /* === DATA SCROLL DOT === */
  @keyframes datascroll {
    0%   { transform: translateX(0px); }
    85%  { transform: translateX(44px); }
    86%  { opacity: 0; }
    100% { opacity: 0; }
  }
  .data-dot {
    animation: datascroll 3s linear infinite;
  }

  /* === TALK MOUTH EQUALIZER BARS === */
  @keyframes bar1 {
    0%   { opacity: 1; }
    25%  { opacity: 1; }
    50%  { opacity: 1; }
    75%  { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes eq1 {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  @keyframes eq2 {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.3); }
  }
  @keyframes eq3 {
    0%, 100% { transform: scaleY(0.6); }
    33% { transform: scaleY(1); }
    66% { transform: scaleY(0.2); }
  }
  @keyframes eq4 {
    0%, 100% { transform: scaleY(0.5); }
    40% { transform: scaleY(0.2); }
    70% { transform: scaleY(1); }
  }

  /* === CONTENT FLASH === */
  @keyframes contentflash {
    0%   { opacity: 0.5; }
    8%   { opacity: 0.5; }
    9%   { opacity: 0; }
    100% { opacity: 0; }
  }
  .content-flash {
    animation: contentflash 1.5s steps(1) 1;
  }
</style>


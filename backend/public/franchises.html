<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex - Franchises</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="franchises-page">
      <nav class="breadcrumb">
        <a href="/hub.html">HUB</a>
        <span class="sep">&rsaquo;</span>
        <span class="current">FRANCHISES</span>
      </nav>

      <header class="franchises-header-shell">
        <div class="franchises-system-nav" aria-label="Navigation globale">
          <a href="/games-list.html">Catalogue</a>
          <span class="is-current">Franchises</span>
          <a href="/encyclopedia.html">Encyclopedie</a>
          <a href="/search.html">Recherche</a>
        </div>

        <div class="franchises-title-block">
          <h1 class="page-title">FRANCHISES</h1>
          <p id="franchise-count" class="page-subtitle">Chargement...</p>
        </div>

        <div class="franchises-search-shell">
          <label class="franchises-search-label" for="franchise-search">INDEX QUERY</label>
          <input
            id="franchise-search"
            class="franchises-search-input"
            type="text"
            placeholder="Nom, studio, periode..."
            autocomplete="off"
            spellcheck="false"
          />
          <a class="franchises-search-link" href="/search.html">RECHERCHE GLOBALE</a>
        </div>
      </header>

      <section class="franchises-layout">
        <aside class="franchises-sidebar">
          <div class="franchises-sidebar-head">
            <div class="franchises-sidebar-kicker">ARCHIVE INDEX</div>
            <div id="franchise-list-meta" class="franchises-sidebar-meta">Selection de franchise</div>
          </div>
          <div id="franchise-list" class="franchise-list"></div>
        </aside>

        <section id="franchise-detail" class="franchises-detail" aria-live="polite">
          <div class="franchise-detail-empty">
            <div class="franchise-archive-slot">
              <span class="franchise-archive-code">RDX</span>
              <span class="franchise-archive-caption">ARCHIVE SLOT</span>
            </div>
            <div class="franchise-empty-copy">Selectionner une franchise dans l'index pour ouvrir le dossier detail.</div>
          </div>
        </section>
      </section>
    </main>

    <script src="/js/pages/franchises.js"></script>
    <div class="footer-attribution">
      Covers : <a href="https://www.igdb.com" target="_blank" rel="noopener noreferrer">IGDB.com</a>
    </div>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#9bbc0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RetroDex" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>RetroDex - Catalogue</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root { --panel-bg: rgba(15,56,15,.2); --panel-line: rgba(155,188,15,.18); --panel-strong: rgba(155,188,15,.42); --text-strong: #cfe66f; --text-soft: rgba(155,188,15,.62); --text-faint: rgba(155,188,15,.4); --text-active: #d8f08f; --legendary: #ddc420; --epic: #c48be8; --rare: #e88855; --uncommon: #44aadd; --common: #5a9a3a; }
      .catalog-shell { max-width: 1120px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
      .catalog-header { display: flex; justify-content: space-between; gap: 12px; align-items: end; flex-wrap: wrap; padding: 10px 0 18px; border-bottom: 1px solid rgba(155,188,15,.16); }
      .catalog-header h1 { font-size: 26px; color: var(--text-strong); letter-spacing: .12em; margin: 10px 0 6px; }
      .catalog-header p { font-size: 11px; color: var(--text-faint); }
      .search-panel { background: var(--panel-bg); border: 1px solid var(--panel-line); border-radius: 6px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
      .search-grid, .filter-grid { display: grid; gap: 12px; }
      .search-grid { grid-template-columns: minmax(0,2fr) repeat(3,minmax(150px,1fr)); }
      .filter-grid { grid-template-columns: minmax(150px,1.1fr) minmax(150px,1.1fr) repeat(2,minmax(110px,.85fr)) minmax(180px,1.2fr); }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .08em; }
      .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--panel-line); border-radius: 4px; background: rgba(10,10,10,.85); color: #9bbc0f; font: inherit; }
      .field input:focus, .field select:focus { outline: none; border-color: var(--panel-strong); }
      .search-actions, .results-bar, .pagination-bar { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
      .reset-link { color: var(--text-active); font-size: 11px; text-decoration: none; border-bottom: 1px dashed rgba(216,240,143,.45); }
      .reset-link:hover { border-bottom-color: var(--text-active); }
      .results-bar { font-size: 11px; color: var(--text-faint); }
      .results-summary-line { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .summary-pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(155,188,15,.2); background: rgba(10,10,10,.35); }
      .summary-pill.active { color: var(--text-active); border-color: rgba(216,240,143,.55); background: rgba(216,240,143,.08); }
      .results-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 14px; }
      .game-card { background: rgba(15,56,15,.16); border: 1px solid var(--common); border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 220px; }
      .game-card.rarity-legendary { border-color: var(--legendary); }
      .game-card.rarity-epic { border-color: var(--epic); }
      .game-card.rarity-rare { border-color: var(--rare); }
      .game-card.rarity-uncommon { border-color: var(--uncommon); }
      .game-card.rarity-common { border-color: var(--common); }
      .game-thumb { width: 100%; height: 68px; display: block; border-radius: 4px; border: 1px solid rgba(155,188,15,.16); background: #0a0a0a; image-rendering: pixelated; }
      .game-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
      .game-title { font-size: 14px; color: var(--text-strong); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .game-subtitle { font-size: 11px; color: var(--text-soft); }
      .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
      .genre-pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 10px; letter-spacing: .05em; border: 1px solid rgba(155,188,15,.22); background: rgba(155,188,15,.08); color: rgba(155,188,15,.72); }
      .price-row { margin-top: auto; font-size: 11px; color: var(--text-soft); line-height: 1.6; }
      .trend-mini { font-size: .65rem; padding: 0 .3rem; font-weight: bold; }
      .trend-mini.up { color: #9bbc0f; }
      .trend-mini.down { color: #e85555; }
      .trend-mini.stable { color: #8bac0f; }
      .empty-state, .loading-state { padding: 32px 20px; text-align: center; border: 1px dashed rgba(155,188,15,.18); border-radius: 6px; color: var(--text-faint); background: rgba(15,56,15,.08); }
      .empty-state strong { color: var(--text-strong); }
      .suggestions { margin-top: 14px; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
      .suggestion-btn { background: transparent; color: var(--text-active); border: 1px solid rgba(216,240,143,.28); border-radius: 999px; padding: 6px 10px; font: inherit; font-size: 11px; cursor: pointer; }
      .suggestion-btn:hover { border-color: rgba(216,240,143,.7); background: rgba(216,240,143,.08); }
      .pagination-bar { padding-bottom: 20px; }
      .page-indicator { font-size: 11px; color: var(--text-faint); }
      @media (max-width: 980px) { .search-grid, .filter-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } .results-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
      @media (max-width: 640px) { .search-grid, .filter-grid, .results-grid { grid-template-columns: 1fr; } .catalog-header { align-items: flex-start; } .results-bar, .pagination-bar, .search-actions { flex-direction: column; align-items: stretch; } .search-actions .btn, .pagination-bar .btn { width: 100%; text-align: center; } }
    </style>
  </head>
  <body>
    <main class="catalog-shell">
      <header class="catalog-header">
        <div>
          <a href="/hub.html" class="btn">&larr; Hub</a>
          <h1>CATALOGUE</h1>
          <p id="catalog-subtitle">507 jeux retro</p>
        </div>
      </header>

      <section class="search-panel">
        <div class="search-grid">
          <div class="field">
            <label for="query">Recherche</label>
            <input id="query" type="text" placeholder="Zelda, Mario, Metroid..." autocomplete="off" />
          </div>
          <div class="field">
            <label for="console">Console</label>
            <select id="console"><option value="">Toutes</option></select>
          </div>
          <div class="field">
            <label for="rarity">Rarete</label>
            <select id="rarity">
              <option value="">Toutes</option>
              <option value="LEGENDARY">LEGENDARY</option>
              <option value="EPIC">EPIC</option>
              <option value="RARE">RARE</option>
              <option value="UNCOMMON">UNCOMMON</option>
              <option value="COMMON">COMMON</option>
            </select>
          </div>
          <div class="field">
            <label for="limit">Par page</label>
            <select id="limit">
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>

        <button id="toggle-advanced"
          type="button"
          onclick="toggleAdvanced()"
          style="background:none;border:1px solid #306230;color:#5a9a3a;padding:0.3rem 0.75rem;font-size:0.7rem;cursor:pointer;margin-top:0.5rem;align-self:flex-start;">
          + Filtres avancés
        </button>

        <div id="advanced-filters" style="display:none;">
        <div class="filter-grid">
          <div class="field">
            <label for="genre">Genre</label>
            <select id="genre"><option value="">Tous</option></select>
          </div>
          <div class="field">
            <label for="filter-trend">Tendance</label>
            <select id="filter-trend">
              <option value="">Tendance: Toutes</option>
              <option value="up">↑ En hausse</option>
              <option value="down">↓ En baisse</option>
              <option value="stable">= Stable</option>
            </select>
          </div>
          <div class="field">
            <label for="year-min">Annee min</label>
            <input id="year-min" type="number" min="1970" max="2012" placeholder="1970" />
          </div>
          <div class="field">
            <label for="year-max">Annee max</label>
            <input id="year-max" type="number" min="1970" max="2012" placeholder="2012" />
          </div>
          <div class="field">
            <label for="sort-by">Trier par</label>
            <select id="sort-by">
              <option value="title_asc" selected>Title A-Z</option>
              <option value="title_desc">Title Z-A</option>
              <option value="loose_asc">Price Loose ↑</option>
              <option value="loose_desc">Price Loose ↓</option>
              <option value="mint_asc">Price Mint ↑</option>
              <option value="mint_desc">Price Mint ↓</option>
              <option value="meta_asc">Metascore ↑</option>
              <option value="meta_desc">Metascore ↓</option>
              <option value="year_asc">Year ↑</option>
              <option value="year_desc">Year ↓</option>
            </select>
          </div>
        </div>

        </div>

        <div class="search-actions">
          <a id="reset-filters" href="#" class="reset-link">Reinitialiser</a>
          <button id="search-button" type="button" class="btn">Rechercher</button>
        </div>
      </section>

      <section class="results-bar">
        <div id="results-summary" class="results-summary-line">Chargement...</div>
        <div id="loading-indicator" class="status-bar"></div>
      </section>

      <section id="results" class="results-grid"></section>

      <section class="pagination-bar">
        <button id="prev-button" type="button" class="btn">Previous</button>
        <div id="page-indicator" class="page-indicator">Page 1 of 1</div>
        <button id="next-button" type="button" class="btn">Next</button>
      </section>
    </main>

    <script>
      const queryEl = document.getElementById("query");
      const consoleEl = document.getElementById("console");
      const rarityEl = document.getElementById("rarity");
      const limitEl = document.getElementById("limit");
      const genreEl = document.getElementById("genre");
      const trendEl = document.getElementById("filter-trend");
      const yearMinEl = document.getElementById("year-min");
      const yearMaxEl = document.getElementById("year-max");
      const sortEl = document.getElementById("sort-by");
      const searchButtonEl = document.getElementById("search-button");
      const resetFiltersEl = document.getElementById("reset-filters");
      const resultsSummaryEl = document.getElementById("results-summary");
      const loadingIndicatorEl = document.getElementById("loading-indicator");
      const resultsEl = document.getElementById("results");
      const pageIndicatorEl = document.getElementById("page-indicator");
      const prevButtonEl = document.getElementById("prev-button");
      const nextButtonEl = document.getElementById("next-button");
      const subtitleEl = document.getElementById("catalog-subtitle");
      const advancedFiltersEl = document.getElementById("advanced-filters");
      const toggleAdvancedEl = document.getElementById("toggle-advanced");

      let debounceTimer;
      let currentOffset = 0;
      let totalGames = 507;
      let masterGames = [];
      let fetchedGames = [];
      let filteredGames = [];

      const esc = (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const num = (value) => Number(value) || 0;
      const price = (value) => Number.isFinite(Number(value)) ? `$${Number(value)}` : "n/a";
      const rClass = (value) => String(value || "COMMON").toLowerCase();
      const textCmp = (left, right) => String(left || "").localeCompare(String(right || ""), "fr", { sensitivity: "base" });

      function renderCardThumb(canvas, game) {
        const w = 120;
        const h = 68;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        let seed = 0;
        const str = game.id || game.title || "";
        for (let i = 0; i < str.length; i++) {
          seed = (seed * 31 + str.charCodeAt(i)) | 0;
        }
        seed = Math.abs(seed);

        const palettes = {
          "PlayStation": ["#050520", "#0f0f45", "#1a1a8b", "#4444dd"],
          "Super Nintendo": ["#0d0d0d", "#1a3a1a", "#2d6a2d", "#7abf7a"],
          "Sega Genesis": ["#1a0a2e", "#2d1654", "#6a3fa0", "#c48be8"],
          "Sega Saturn": ["#1a0505", "#3d0f0f", "#8b1a1a", "#e85555"],
          "Nintendo 64": ["#1a1a05", "#3d3d0f", "#8b7a00", "#ddc420"],
          "Game Boy": ["#0f380f", "#306230", "#8bac0f", "#9bbc0f"],
          "Game Boy Advance": ["#05051a", "#0f1a3d", "#1a3d8b", "#44aadd"],
          "Nintendo DS": ["#05051a", "#0f1a3d", "#2a5a9b", "#7ab4e8"],
          "Dreamcast": ["#05101a", "#0f2535", "#1a558b", "#55aae8"],
          "Nintendo Entertainment System": ["#1a1a2e", "#16213e", "#0f3460", "#e94560"],
        };
        const p = palettes[game.console] || ["#0f380f", "#306230", "#8bac0f", "#9bbc0f"];

        const style = seed % 4;
        ctx.fillStyle = p[0];
        ctx.fillRect(0, 0, w, h);

        if (style === 0) {
          ctx.fillStyle = p[1];
          ctx.fillRect(8, 8, w - 16, h - 24);
          ctx.fillStyle = p[2];
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(16, 14 + i * 8, w - 32, 4);
          }
        } else if (style === 1) {
          for (let y = 0; y < h; y += 4) {
            ctx.fillStyle = p[1];
            ctx.globalAlpha = 0.4;
            ctx.fillRect(0, y, w, 2);
          }
          ctx.globalAlpha = 1;
          ctx.fillStyle = p[2];
          ctx.beginPath();
          ctx.arc(w / 2, h / 2 - 8, 20, 0, Math.PI * 2);
          ctx.fill();
        } else if (style === 2) {
          ctx.fillStyle = p[1];
          ctx.fillRect(0, 0, w, h * 0.4);
          ctx.fillStyle = p[3];
          ctx.fillRect(w - 14, 4, 10, 10);
          for (let i = 0; i < 5; i++) {
            const bx = (seed * 7 + i * 23) % (w - 20) + 4;
            const bh = (seed * 3 + i * 17) % 16 + 6;
            ctx.fillStyle = p[2];
            ctx.fillRect(bx, h * 0.4 - bh, 12, bh);
          }
        } else {
          ctx.fillStyle = p[1];
          ctx.fillRect(w * 0.15, h * 0.1, w * 0.7, h * 0.7);
          ctx.fillStyle = p[0];
          ctx.fillRect(w * 0.15 + 2, h * 0.1 + 2, w * 0.7 - 4, h * 0.7 - 4);
          ctx.fillStyle = p[3];
          ctx.fillRect(w * 0.35, h * 0.25, w * 0.3, 6);
          ctx.fillRect(w * 0.35, h * 0.45, w * 0.3, 6);
        }

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, h - 14, w, 14);
        ctx.fillStyle = p[3];
        ctx.font = "7px monospace";
        ctx.fillText((game.title || "").substring(0, 18), 3, h - 4);
      }

      function yearVal(value) {
        const year = Number.parseInt(String(value || ""), 10);
        return Number.isFinite(year) ? Math.max(1970, Math.min(2012, year)) : "";
      }

      function toggleAdvanced(forceOpen) {
        const open = typeof forceOpen === "boolean"
          ? forceOpen
          : advancedFiltersEl.style.display === "none";

        advancedFiltersEl.style.display = open ? "block" : "none";
        toggleAdvancedEl.textContent = open ? "− Filtres avancés" : "+ Filtres avancés";
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      function readStateFromUrl() {
        const params = new URLSearchParams(location.search);
        queryEl.value = params.get("q") || "";
        consoleEl.dataset.pending = params.get("console") || "";
        rarityEl.value = params.get("rarity") || "";
        genreEl.dataset.pending = params.get("genre") || "";
        trendEl.value = params.get("trend") || "";
        limitEl.value = ["20", "50", "100"].includes(params.get("limit")) ? params.get("limit") : "20";
        sortEl.value = params.get("sort") || "title_asc";
        yearMinEl.value = yearVal(params.get("yearMin"));
        yearMaxEl.value = yearVal(params.get("yearMax"));
        currentOffset = Math.max(0, Number.parseInt(params.get("offset") || "0", 10) || 0);
      }

      function state() {
        let yearMin = yearVal(yearMinEl.value);
        let yearMax = yearVal(yearMaxEl.value);

        if (yearMin && yearMax && yearMin > yearMax) {
          const swap = yearMin;
          yearMin = yearMax;
          yearMax = swap;
        }

        return {
          q: queryEl.value.trim(),
          console: consoleEl.value,
          rarity: rarityEl.value,
          genre: genreEl.value,
          trend: trendEl.value,
          yearMin,
          yearMax,
          limit: Number.parseInt(limitEl.value, 10) || 20,
          sort: sortEl.value || "title_asc",
          offset: currentOffset,
        };
      }

      function updateUrl(currentState) {
        const url = new URL(location.href);
        const entries = [
          ["q", currentState.q],
          ["console", currentState.console],
          ["rarity", currentState.rarity],
          ["genre", currentState.genre],
          ["trend", currentState.trend],
          ["yearMin", currentState.yearMin ? String(currentState.yearMin) : ""],
          ["yearMax", currentState.yearMax ? String(currentState.yearMax) : ""],
          ["limit", String(currentState.limit)],
          ["sort", currentState.sort],
          ["offset", String(currentState.offset)],
        ];

        entries.forEach(([key, value]) => {
          if (value) url.searchParams.set(key, value);
          else url.searchParams.delete(key);
        });

        history.replaceState({}, "", url);
      }

      function sortGames(items, sortKey) {
        return [...items].sort((left, right) => {
          switch (sortKey) {
            case "title_desc":
              return textCmp(right.title, left.title);
            case "loose_asc":
              return num(left.loosePrice) - num(right.loosePrice) || textCmp(left.title, right.title);
            case "loose_desc":
              return num(right.loosePrice) - num(left.loosePrice) || textCmp(left.title, right.title);
            case "mint_asc":
              return num(left.mintPrice) - num(right.mintPrice) || textCmp(left.title, right.title);
            case "mint_desc":
              return num(right.mintPrice) - num(left.mintPrice) || textCmp(left.title, right.title);
            case "meta_asc":
              return num(left.metascore) - num(right.metascore) || textCmp(left.title, right.title);
            case "meta_desc":
              return num(right.metascore) - num(left.metascore) || textCmp(left.title, right.title);
            case "year_asc":
              return num(left.year) - num(right.year) || textCmp(left.title, right.title);
            case "year_desc":
              return num(right.year) - num(left.year) || textCmp(left.title, right.title);
            default:
              return textCmp(left.title, right.title);
          }
        });
      }

      function detailUrl(game, currentState) {
        const params = new URLSearchParams();
        [
          ["q", currentState.q],
          ["console", currentState.console],
          ["rarity", currentState.rarity],
          ["genre", currentState.genre],
          ["trend", currentState.trend],
        ].forEach(([key, value]) => value && params.set(key, value));

        if (currentState.yearMin) params.set("yearMin", String(currentState.yearMin));
        if (currentState.yearMax) params.set("yearMax", String(currentState.yearMax));

        params.set("limit", String(currentState.limit));
        params.set("sort", currentState.sort);
        params.set("offset", String(currentState.offset));
        params.set("id", game.id);

        return `/game-detail.html?${params.toString()}`;
      }

      function card(game, currentState) {
        const trendValue = game.trend?.mint || "";
        const trendSymbol = { up: "↑", down: "↓", stable: "=" }[trendValue] || "";

        return `<article class="game-card rarity-${esc(rClass(game.rarity))}">
          <canvas class="game-thumb"></canvas>
          <div class="game-head">
            <div style="min-width:0;">
              <h3 class="game-title" title="${esc(game.title)}">${esc(game.title)}</h3>
              <div class="game-subtitle">${esc(game.console || "Console inconnue")} · ${esc(game.year || "n/a")}</div>
            </div>
            <span class="rarity-badge rarity-${esc(rClass(game.rarity))}">${esc(game.rarity || "COMMON")}</span>
          </div>
          <div class="pill-row">
            <span class="genre-pill">${esc(game.genre || "Genre inconnu")}</span>
          </div>
          <div class="price-row">
            Loose ${esc(price(game.loosePrice))} · CIB ${esc(price(game.cibPrice))} · Mint ${esc(price(game.mintPrice))}
            ${trendSymbol ? `<span class="trend-mini ${esc(trendValue)}">${esc(trendSymbol)}</span>` : ""}
          </div>
          <div><a href="${detailUrl(game, currentState)}" class="btn">Voir fiche</a></div>
        </article>`;
      }

      function renderSummary(currentState, total) {
        const pills = [
          `<span class="summary-pill active">${total} jeux</span>`,
          `<span class="summary-pill ${currentState.console ? "active" : ""}">console: ${esc(currentState.console || "Toutes")}</span>`,
          `<span class="summary-pill ${currentState.rarity ? "active" : ""}">rarete: ${esc(currentState.rarity || "Toutes")}</span>`,
          `<span class="summary-pill ${currentState.genre ? "active" : ""}">genre: ${esc(currentState.genre || "Tous")}</span>`,
        ];

        if (currentState.trend) {
          pills.push(`<span class="summary-pill active">tendance: ${esc(currentState.trend)}</span>`);
        }

        if (currentState.yearMin || currentState.yearMax) {
          pills.push(`<span class="summary-pill active">annee: ${esc(currentState.yearMin || 1970)}-${esc(currentState.yearMax || 2012)}</span>`);
        }

        resultsSummaryEl.innerHTML = pills.join("");
      }

      function suggestions() {
        const fallback = [
          { title: "Panzer Dragoon Saga", metascore: 98 },
          { title: "Chrono Trigger", metascore: 95 },
          { title: "Super Mario World", metascore: 94 },
          { title: "The Legend of Zelda: A Link to the Past", metascore: 95 },
          { title: "Final Fantasy VII", metascore: 92 },
          { title: "Radiant Silvergun", metascore: 94 },
        ];
        const pool = [...(masterGames.length ? masterGames : fallback)]
          .sort((left, right) => num(right.metascore) - num(left.metascore) || textCmp(left.title, right.title))
          .slice(0, 24);
        const picks = [];

        while (pool.length && picks.length < 3) {
          picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
        }

        return picks;
      }

      function renderEmpty(currentState) {
        const picks = suggestions();
        const suffix = currentState.q ? ` pour &laquo;${esc(currentState.q)}&raquo;.` : ".";

        resultsEl.innerHTML = `<div class="empty-state">
          <div><strong>Aucun jeu trouve${suffix}</strong></div>
          <div style="margin-top:8px;">Essayez: ${picks.map((game) => esc(game.title)).join(" · ") || "un autre filtre"}.</div>
          ${picks.length ? `<div class="suggestions">${picks.map((game) => `<button type="button" class="suggestion-btn" data-suggestion="${esc(game.title)}">${esc(game.title)}</button>`).join("")}</div>` : ""}
        </div>`;

        resultsEl.querySelectorAll("[data-suggestion]").forEach((button) => {
          button.addEventListener("click", () => {
            queryEl.value = button.dataset.suggestion || "";
            currentOffset = 0;
            loadGames();
          });
        });
      }

      function applyFilters(currentState) {
        filteredGames = fetchedGames.filter((game) => {
          const rarity = String(game.rarity || "").toUpperCase();
          const genre = String(game.genre || "");
          const year = num(game.year);
          const trend = String(game.trend?.mint || "");

          if (currentState.rarity && rarity !== currentState.rarity) return false;
          if (currentState.genre && genre !== currentState.genre) return false;
          if (currentState.trend && trend !== currentState.trend) return false;
          if (currentState.yearMin && (!year || year < currentState.yearMin)) return false;
          if (currentState.yearMax && (!year || year > currentState.yearMax)) return false;

          return true;
        });
      }

      function render(currentState) {
        filteredGames = sortGames(filteredGames, currentState.sort);
        const total = filteredGames.length;
        const start = currentState.offset;
        const end = Math.min(start + currentState.limit, total);
        const pageItems = filteredGames.slice(start, end);
        const page = total ? Math.floor(start / currentState.limit) + 1 : 1;
        const totalPages = Math.max(1, Math.ceil(total / currentState.limit));

        renderSummary(currentState, total);
        pageIndicatorEl.textContent = `Page ${page} of ${totalPages}`;
        prevButtonEl.disabled = start <= 0;
        nextButtonEl.disabled = end >= total;

        if (!pageItems.length) {
          renderEmpty(currentState);
          return;
        }

        resultsEl.innerHTML = pageItems.map((game) => card(game, currentState)).join("");
        resultsEl.querySelectorAll(".game-thumb").forEach((canvas, index) => {
          renderCardThumb(canvas, pageItems[index]);
        });
      }

      async function loadConsoles() {
        const payload = await fetchJson("/api/consoles");
        payload.items.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.name;
          option.textContent = `${item.name} (${item.gamesCount})`;
          if (consoleEl.dataset.pending === item.name) option.selected = true;
          consoleEl.appendChild(option);
        });
      }

      function populateGenres(source) {
        const genres = [...new Set((source || masterGames).map((game) => String(game.genre || "").trim()).filter(Boolean))].sort(textCmp);
        if (genreEl.options.length > 1 || !genres.length) return;

        genres.forEach((genre) => {
          const option = document.createElement("option");
          option.value = genre;
          option.textContent = genre;
          if (genreEl.dataset.pending === genre) option.selected = true;
          genreEl.appendChild(option);
        });
      }

      async function loadMeta() {
        try {
          const [statsPayload, gamesPayload] = await Promise.all([
            fetchJson("/api/stats"),
            fetchJson("/games"),
          ]);
          totalGames = statsPayload.totals?.games || totalGames;
          masterGames = Array.isArray(gamesPayload) ? gamesPayload : [];
        } catch (_) {
          masterGames = masterGames || [];
        }

        subtitleEl.textContent = `${totalGames} jeux retro`;
        populateGenres();
      }

      async function loadGames() {
        const currentState = state();
        updateUrl(currentState);
        loadingIndicatorEl.textContent = "Chargement...";
        resultsEl.innerHTML = '<div class="loading-state">Chargement...</div>';

        const params = new URLSearchParams();
        if (currentState.q) params.set("q", currentState.q);
        if (currentState.console) params.set("console", currentState.console);
        params.set("limit", String(Math.max(totalGames || 507, 507)));
        params.set("include_trend", "1");

        try {
          const payload = await fetchJson(`/api/games?${params.toString()}`);
          fetchedGames = Array.isArray(payload.items) ? payload.items : [];
          populateGenres(fetchedGames);
          applyFilters(currentState);

          if (currentState.offset >= filteredGames.length && filteredGames.length > 0) {
            currentOffset = Math.max(0, Math.floor((filteredGames.length - 1) / currentState.limit) * currentState.limit);
            return loadGames();
          }

          render(currentState);
          loadingIndicatorEl.textContent = "";
        } catch (error) {
          loadingIndicatorEl.textContent = `Erreur: ${error.message}`;
          resultsEl.innerHTML = '<div class="empty-state">Impossible de charger le catalogue.</div>';
        }
      }

      function searchNow() {
        clearTimeout(debounceTimer);
        currentOffset = 0;
        loadGames();
      }

      function resetFilters() {
        queryEl.value = "";
        consoleEl.value = "";
        rarityEl.value = "";
        genreEl.value = "";
        trendEl.value = "";
        yearMinEl.value = "";
        yearMaxEl.value = "";
        sortEl.value = "title_asc";
        limitEl.value = "20";
        currentOffset = 0;
        toggleAdvanced(false);
        loadGames();
      }

      searchButtonEl.addEventListener("click", searchNow);
      resetFiltersEl.addEventListener("click", (event) => {
        event.preventDefault();
        resetFilters();
      });

      queryEl.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          currentOffset = 0;
          loadGames();
        }, 300);
      });

      queryEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          searchNow();
        }
        if (event.key === "Escape") {
          event.preventDefault();
          queryEl.value = "";
          searchNow();
        }
      });

      [consoleEl, rarityEl, genreEl, trendEl, limitEl, sortEl].forEach((element) => {
        element.addEventListener("change", () => {
          currentOffset = 0;
          loadGames();
        });
      });

      [yearMinEl, yearMaxEl].forEach((element) => {
        element.addEventListener("input", () => {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            currentOffset = 0;
            loadGames();
          }, 300);
        });
        element.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            searchNow();
          }
        });
      });

      prevButtonEl.addEventListener("click", () => {
        const currentState = state();
        currentOffset = Math.max(0, currentState.offset - currentState.limit);
        loadGames();
      });

      nextButtonEl.addEventListener("click", () => {
        const currentState = state();
        if (currentState.offset + currentState.limit < filteredGames.length) {
          currentOffset = currentState.offset + currentState.limit;
          loadGames();
        }
      });

      document.addEventListener("keydown", (event) => {
        const tag = event.target?.tagName;
        const inField = tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || event.target?.isContentEditable;

        if (event.key === "Escape" && queryEl.value) {
          queryEl.value = "";
          currentOffset = 0;
          loadGames();
          return;
        }

        if (inField) return;

        const currentState = state();
        if (event.key === "ArrowLeft" && currentState.offset > 0) {
          event.preventDefault();
          currentOffset = Math.max(0, currentState.offset - currentState.limit);
          loadGames();
        }
        if (event.key === "ArrowRight" && currentState.offset + currentState.limit < filteredGames.length) {
          event.preventDefault();
          currentOffset = currentState.offset + currentState.limit;
          loadGames();
        }
      });

      readStateFromUrl();
      window.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const hasAdv = params.get("genre")
          || params.get("yearMin")
          || params.get("yearMax")
          || params.get("trend")
          || (params.get("sort") && params.get("sort") !== "title_asc");
        if (hasAdv) toggleAdvanced(true);
      });
      Promise.all([loadConsoles(), loadMeta()])
        .then(() => loadGames())
        .catch((error) => {
          loadingIndicatorEl.textContent = `Erreur initiale: ${error.message}`;
          resultsEl.innerHTML = '<div class="empty-state">Chargement impossible.</div>';
        });
    </script>
  </body>
</html>

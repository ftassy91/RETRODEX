<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetroDex GamesList</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081008;
        --panel: #102010;
        --line: #294229;
        --text: #d7efd7;
        --muted: #98b898;
        --accent: #8bac0f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Consolas, "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0 0 12px;
      }

      .panel {
        margin-bottom: 16px;
        padding: 16px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .field {
        flex: 1 1 220px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: #081408;
        color: var(--text);
        font: inherit;
      }

      button {
        cursor: pointer;
        background: #183018;
      }

      button:hover {
        border-color: var(--accent);
      }

      .status {
        color: var(--accent);
        min-height: 20px;
      }

      .muted {
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .list-card {
        border: 1px solid var(--line);
        background: #0b160b;
        padding: 12px;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .actions button,
      .actions a {
        width: auto;
        min-width: 160px;
      }

      a.button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: #183018;
        color: var(--text);
        text-decoration: none;
      }

    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>RetroDex GamesList</h1>
        <p class="muted">
          Page beginner isolee pour consommer <code>GET /games</code> sans toucher au flux
          statique principal.
        </p>
        <div class="actions">
          <a class="button-link" href="/home.html">Retour a Home backend</a>
          <a class="button-link" href="/consoles.html">Ouvrir Consoles</a>
          <a class="button-link" href="/debug.html">Ouvrir la page debug backend</a>
        </div>
      </section>

      <section class="panel">
        <h2>Recherche simple</h2>
        <div class="row">
          <div class="field">
            <label for="query">Titre contient</label>
            <input id="query" type="text" placeholder="Zelda, Mario, Metroid..." />
          </div>
          <div class="field">
            <label for="console">Console</label>
            <select id="console">
              <option value="">Toutes</option>
            </select>
          </div>
          <div class="field">
            <label for="limit">Limite</label>
            <select id="limit">
              <option>5</option>
              <option selected>10</option>
              <option>20</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <button id="searchButton" type="button">Charger la liste</button>
          </div>
        </div>
        <div id="status" class="status">Chargement initial...</div>
      </section>

      <section class="panel">
        <h2>Liste</h2>
        <div id="results" class="grid"></div>
      </section>
    </main>

    <script>
      const queryEl = document.getElementById("query");
      const consoleEl = document.getElementById("console");
      const limitEl = document.getElementById("limit");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function fetchJson(url) {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }

        return response.json();
      }

      function applyUrlFilters() {
        const params = new URLSearchParams(window.location.search);
        const q = params.get("q");
        const consoleName = params.get("console");
        const limit = params.get("limit");

        if (q) {
          queryEl.value = q;
        }

        if (limit && Array.from(limitEl.options).some((option) => option.value === limit)) {
          limitEl.value = limit;
        }

        return {
          consoleName,
        };
      }

      function updateUrlFilters() {
        const url = new URL(window.location.href);

        if (queryEl.value.trim()) {
          url.searchParams.set("q", queryEl.value.trim());
        } else {
          url.searchParams.delete("q");
        }

        if (consoleEl.value) {
          url.searchParams.set("console", consoleEl.value);
        } else {
          url.searchParams.delete("console");
        }

        url.searchParams.set("limit", limitEl.value);
        window.history.replaceState({}, "", url);
      }

      function gameCard(game) {
        return `
          <article class="list-card">
            <h3>${escapeHtml(game.title)}</h3>
            <div class="meta">
              <div><span class="muted">ID</span><br>${escapeHtml(game.id)}</div>
              <div><span class="muted">Console</span><br>${escapeHtml(game.console || "n/a")}</div>
              <div><span class="muted">Year</span><br>${escapeHtml(game.year || "n/a")}</div>
              <div><span class="muted">Genre</span><br>${escapeHtml(game.genre || "n/a")}</div>
            </div>
            <div class="actions">
              <a
                class="button-link"
                href="/game-detail.html?id=${encodeURIComponent(game.id)}"
              >
                Ouvrir GameDetail
              </a>
              <a
                class="button-link"
                href="/debug.html?gameId=${encodeURIComponent(game.id)}"
                target="_blank"
                rel="noreferrer"
              >
                Ouvrir detail riche
              </a>
            </div>
          </article>
        `;
      }

      async function loadConsoles(selectedConsoleName = "") {
        const payload = await fetchJson("/api/consoles");
        for (const item of payload.items) {
          const option = document.createElement("option");
          option.value = item.name;
          option.textContent = `${item.name} (${item.gamesCount})`;
          if (selectedConsoleName && item.name === selectedConsoleName) {
            option.selected = true;
          }
          consoleEl.appendChild(option);
        }
      }

      async function searchGames() {
        statusEl.textContent = "Chargement de la liste...";
        resultsEl.innerHTML = "";

        const params = new URLSearchParams();
        if (queryEl.value.trim()) {
          params.set("q", queryEl.value.trim());
        }
        if (consoleEl.value) {
          params.set("console", consoleEl.value);
        }
        params.set("limit", limitEl.value);
        updateUrlFilters();

        try {
          const items = await fetchJson(`/games?${params.toString()}`);

          if (!items.length) {
            statusEl.textContent = "Aucun jeu trouve pour ce filtre.";
            resultsEl.innerHTML = '<div class="muted">Aucun resultat.</div>';
            return;
          }

          statusEl.textContent = `${items.length} jeu(x) affiche(s).`;
          resultsEl.innerHTML = items.map(gameCard).join("");
        } catch (error) {
          statusEl.textContent = `Erreur liste - ${error.message}`;
          resultsEl.innerHTML = `<div class="muted">Erreur: ${escapeHtml(error.message)}</div>`;
        }
      }

      document.getElementById("searchButton").addEventListener("click", searchGames);

      const initialFilters = applyUrlFilters();

      loadConsoles(initialFilters.consoleName)
        .then(searchGames)
        .catch((error) => {
          statusEl.textContent = `Erreur initiale - ${error.message}`;
        });
    </script>
  </body>
</html>
